<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice 3D: O País das Cartas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        .btn-retry {
            background: #e74c3c;
            padding: 15px 45px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-retry:hover { background: #c0392b; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat-box">
        <div class="text-xs opacity-80 uppercase tracking-tighter">Pontuação</div>
        <div id="score" class="text-3xl font-bold">0</div>
    </div>
    <div class="stat-box">
        <div class="text-xs opacity-80 uppercase tracking-tighter">Vidas</div>
        <div id="lives" class="text-3xl font-bold">5</div>
    </div>
</div>

<div id="game-over">
    <h1 class="text-6xl font-bold mb-2 text-center">Game Over</h1>
    <p class="text-xl opacity-80">A Rainha de Copas apanhou-te!</p>
    <div id="final-score" class="text-4xl mt-6 font-bold">0</div>
    <div class="btn-retry" onclick="resetGame()">Tentar Novamente</div>
</div>

<script>
    let scene, camera, renderer, alice, clock;
    let score = 0;
    let lives = 5;
    let isGameOver = false;
    let items = [];
    let keys = { left: false, right: false };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.Fog(0x87ceeb, 10, 60);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 15, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Grass Ground
        const groundGeo = new THREE.PlaneGeometry(50, 200);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x27ae60 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Add Simple Flowers
        for(let i = 0; i < 150; i++) {
            const flowerGeo = new THREE.CircleGeometry(0.12, 8);
            const flowerMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xe74c3c : 0xf1c40f });
            const flower = new THREE.Mesh(flowerGeo, flowerMat);
            flower.position.set((Math.random()-0.5)*40, 0.02, (Math.random()-0.5)*150);
            flower.rotation.x = -Math.PI / 2;
            scene.add(flower);
        }

        createAlice();
       
        clock = new THREE.Clock();
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('keydown', (e) => handleKeys(e, true));
        window.addEventListener('keyup', (e) => handleKeys(e, false));

        animate();
    }

    function createAlice() {
        alice = new THREE.Group();

        // Dress
        const skirtGeo = new THREE.CylinderGeometry(0.3, 1, 1.5, 16);
        const skirtMat = new THREE.MeshPhongMaterial({ color: 0x3498db });
        const skirt = new THREE.Mesh(skirtGeo, skirtMat);
        skirt.position.y = 0.75;
        skirt.castShadow = true;
        alice.add(skirt);

        // Apron
        const apronGeo = new THREE.CylinderGeometry(0.31, 0.6, 1, 16, 1, true, 0, Math.PI);
        const apronMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const apron = new THREE.Mesh(apronGeo, apronMat);
        apron.position.y = 0.8;
        apron.rotation.y = Math.PI / 2;
        alice.add(apron);

        // Torso
        const torsoGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.8, 12);
        const torso = new THREE.Mesh(torsoGeo, skirtMat);
        torso.position.y = 1.8;
        alice.add(torso);

        // Head
        const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
        const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 2.5;
        alice.add(head);

        // Hair
        const hairGeo = new THREE.SphereGeometry(0.38, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const hairMat = new THREE.MeshPhongMaterial({ color: 0xf1c40f });
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.y = 2.55;
        alice.add(hair);

        // Arms
        const armGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.8);
        const armL = new THREE.Mesh(armGeo, headMat);
        armL.position.set(-0.45, 1.8, 0);
        armL.rotation.z = 0.2;
        alice.add(armL);

        const armR = new THREE.Mesh(armGeo, headMat);
        armR.position.set(0.45, 1.8, 0);
        armR.rotation.z = -0.2;
        alice.add(armR);

        alice.position.y = 0;
        scene.add(alice);
    }

    function spawnItem() {
        if (isGameOver) return;
       
        const rand = Math.random();
        let geometry, material, type, value;

        if (rand < 0.75) { // 75% Cards
            type = 'card';
            geometry = new THREE.BoxGeometry(0.8, 1.2, 0.1);
           
            const isRed = Math.random() < 0.4;
            value = isRed ? 20 : 10;
            const color = isRed ? 'red' : 'black';
            const suit = isRed ? (Math.random() > 0.5 ? '♥' : '♦') : (Math.random() > 0.5 ? '♠' : '♣');

            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const context = canvas.getContext('2d');
            context.fillStyle = 'white';
            context.fillRect(0,0,128,128);
            context.fillStyle = color;
            context.font = '80px serif';
            context.textAlign = 'center';
            context.fillText(suit, 64, 90);
           
            const texture = new THREE.CanvasTexture(canvas);
            material = new THREE.MeshPhongMaterial({ map: texture });
        } else { // 25% Teapots
            type = 'teapot';
            value = 0;
            geometry = new THREE.SphereGeometry(0.5, 12, 12);
            material = new THREE.MeshPhongMaterial({ color: 0xe67e22 });
        }

        const mesh = new THREE.Mesh(geometry, material);
        // Start from high above (y=18) to avoid "popping" into existence
        mesh.position.set((Math.random() - 0.5) * 16, 18, 0);
        mesh.castShadow = true;
       
        scene.add(mesh);
        // Consistent slow speed: 0.05 to 0.10
        items.push({ mesh, type, value, speed: 0.05 + Math.random() * 0.05 });
    }

    function handleKeys(e, value) {
        if (e.key === 'ArrowLeft') keys.left = value;
        if (e.key === 'ArrowRight') keys.right = value;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        if (isGameOver) return;
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        // Player Movement
        if (keys.left && alice.position.x > -8) alice.position.x -= 10 * delta;
        if (keys.right && alice.position.x < 8) alice.position.x += 10 * delta;

        // Visual swaying
        alice.rotation.y = Math.sin(Date.now() * 0.003) * 0.08;
       
        // Spawn frequency
        if (Math.random() < 0.05) spawnItem();

        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
           
            // Constant movement downward
            item.mesh.position.y -= item.speed;
            item.mesh.rotation.x += 0.02;
            item.mesh.rotation.z += 0.01;

            // Collision Detection
            const aliceCenter = new THREE.Vector3(alice.position.x, 1.5, 0);
            const dist = item.mesh.position.distanceTo(aliceCenter);
           
            if (dist < 1.6) {
                if (item.type === 'card') {
                    score += item.value;
                    document.getElementById('score').innerText = score;
                } else {
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    if (lives <= 0) endGame();
                }
                scene.remove(item.mesh);
                items.splice(i, 1);
                continue;
            }

            // Corrected cleanup: only remove when far below the floor (y < -2)
            if (item.mesh.position.y < -2) {
                scene.remove(item.mesh);
                items.splice(i, 1);
            }
        }

        renderer.render(scene, camera);
    }

    function endGame() {
        isGameOver = true;
        document.getElementById('final-score').innerText = "Pontuação: " + score;
        document.getElementById('game-over').style.display = 'flex';
    }

    function resetGame() {
        score = 0;
        lives = 5;
        isGameOver = false;
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
        document.getElementById('game-over').style.display = 'none';
       
        items.forEach(item => scene.remove(item.mesh));
        items = [];
        alice.position.x = 0;
       
        clock.getDelta(); // Reset clock
        animate();
    }

    window.onload = init;
</script>
</body>
</html>
