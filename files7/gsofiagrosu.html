<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuga do País das Maravilhas</title>
    <style>
        :root {
            --primary: #8e44ad;
            --accent: #e74c3c;
            --bg: #1a1a1a;
            --card-back: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #f1c40f; text-shadow: 2px 2px #000; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .stat-item { text-align: center; font-size: 1.2rem; }
        .stat-value { font-weight: bold; font-size: 1.5rem; display: block; }

        #game-container {
            perspective: 1000px;
            width: 250px;
            height: 350px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            border: 5px solid white;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        .card-front {
            background-color: var(--card-back);
            background-image: radial-gradient(circle, #34495e 20%, transparent 20%);
            background-size: 20px 20px;
        }

        .card-back {
            background-color: white;
            color: black;
            transform: rotateY(180deg);
        }

        #challenge-text { font-size: 1.1rem; margin-top: 10px; color: #333; }
        #card-symbol { font-size: 4rem; margin: 0; }

        .controls { margin-top: 30px; display: flex; gap: 10px; }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-win { background-color: #2ecc71; color: white; }
        .btn-fail { background-color: #e74c3c; color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .message { margin-top: 20px; font-weight: bold; color: #f1c40f; height: 24px; }
    </style>
</head>
<body>

    <h1>🐇 Fuga das Maravilhas</h1>

    <div class="stats">
        <div class="stat-item">Chaves (Ases): <span id="aces-count" class="stat-value">0 / 4</span></div>
        <div class="stat-item">Fúria da Rainha: <span id="queen-count" class="stat-value">0 / 3</span></div>
    </div>

    <div id="game-container" onclick="drawCard()">
        <div class="card" id="card-element">
            <div class="card-face card-front">
                <span style="font-size: 5rem;">?</span>
                <p>Clica para tirar uma carta</p>
            </div>
            <div class="card-face card-back">
                <h2 id="card-name">Nome da Carta</h2>
                <p id="card-symbol">♥️</p>
                <div id="challenge-text">O desafio aparece aqui...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-success" class="btn-win" onclick="handleResult(true)" disabled>Sucesso!</button>
        <button id="btn-fail" class="btn-fail" onclick="handleResult(false)" disabled>Falhou...</button>
    </div>

    <div class="message" id="msg"></div>

    <script>
        const suits = [
            { symbol: '♥️', name: 'Copas', task: 'Mímica: Imita um animal ou objeto sem falar!' },
            { symbol: '♦️', name: 'Ouros', task: 'Chá do Chapeleiro: Diz 3 coisas que levarias para um chá sem hesitar!' },
            { symbol: '♣️', name: 'Paus', task: 'Rimas: Diz 3 palavras que rimem com a palavra dita pelo vizinho!' },
            { symbol: '♠️', name: 'Espadas', task: 'Gato Cheshire: Soletra o teu nome de trás para a frente!' }
        ];

        const specials = [
            { symbol: 'A', name: 'Ás (A Chave)', task: 'Encontraste uma Chave Mágica! Clica em Sucesso para guardar.' },
            { symbol: 'Q', name: 'Rainha de Copas', task: 'PERIGO! A Rainha viu-te. "Cortem-lhe a cabeça!"' },
            { symbol: 'K', name: 'Rei', task: 'O Gato baralhou o tempo: A ordem dos jogadores inverte-se.' },
            { symbol: 'J', name: 'Valete', task: 'O Coelho Branco ajuda: Esta carta pode anular uma Rainha no futuro.' }
        ];

        let aces = 0;
        let queens = 0;
        let currentCardIsSpecial = false;

        function drawCard() {
            if (aces >= 4 || queens >= 3) return;
           
            const cardEl = document.getElementById('card-element');
            if (cardEl.classList.contains('is-flipped')) {
                cardEl.classList.remove('is-flipped');
                setTimeout(generateNewCard, 300);
            } else {
                generateNewCard();
            }
        }

        function generateNewCard() {
            const isSpecial = Math.random() > 0.7;
            let card;

            if (isSpecial) {
                card = specials[Math.floor(Math.random() * specials.length)];
                document.getElementById('card-symbol').style.color = (card.symbol === 'Q' || card.symbol === 'A') ? 'red' : 'black';
            } else {
                card = suits[Math.floor(Math.random() * suits.length)];
                document.getElementById('card-symbol').style.color = (card.symbol === '♥️' || card.symbol === '♦️') ? 'red' : 'black';
            }

            document.getElementById('card-name').innerText = card.name;
            document.getElementById('card-symbol').innerText = card.symbol;
            document.getElementById('challenge-text').innerText = card.task;
           
            document.getElementById('card-element').classList.add('is-flipped');
           
            // Ativar botões
            document.getElementById('btn-success').disabled = false;
            document.getElementById('btn-fail').disabled = false;
           
            window.currentCard = card;
        }

        function handleResult(success) {
            const card = window.currentCard;
            const msg = document.getElementById('msg');

            if (card.symbol === 'A' && success) {
                aces++;
                msg.innerText = "Chave guardada!";
            } else if (card.symbol === 'Q') {
                queens++;
                msg.innerText = "A Rainha está furiosa...";
            } else {
                msg.innerText = success ? "Desafio superado!" : "O tempo passou...";
            }

            updateStats();
            checkGameOver();
           
            // Resetar botões
            document.getElementById('btn-success').disabled = true;
            document.getElementById('btn-fail').disabled = true;
        }

        function updateStats() {
            document.getElementById('aces-count').innerText = `${aces} / 4`;
            document.getElementById('queen-count').innerText = `${queens} / 3`;
        }

        function checkGameOver() {
            if (aces >= 4) {
                alert("🎉 VITÓRIA! Encontraram as 4 chaves e fugiram do País das Maravilhas!");
                location.reload();
            } else if (queens >= 3) {
                alert("💀 DERROTA! A Rainha apanhou-vos. 'Cortem-lhes as cabeças!'");
                location.reload();
            }
        }
    </script>
</body>
</html>
