<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alice: Pintura Digital</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0e6ff; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #6a0dad; margin-bottom: 10px; }
        #game-container { position: relative; border: 5px solid #6a0dad; border-radius: 10px; background: white; cursor: crosshair; }
        canvas { display: block; background-size: cover; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-level { background: #9b59b6; color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        .color-picker { width: 40px; height: 40px; border: none; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🍄 Alice: Pintura Digital</h1>
   
    <div class="controls">
        <button class="btn-level" onclick="changeLevel(0)">Nível 1: A Toca</button>
        <button class="btn-level" onclick="changeLevel(1)">Nível 2: O Chá</button>
        <button class="btn-level" onclick="changeLevel(2)">Nível 3: O Gato</button>
        <button class="btn-level" onclick="changeLevel(3)">Nível 4: A Rainha</button>
        <button class="btn-level" onclick="changeLevel(4)">Nível 5: O Julgamento</button>
    </div>

    <div id="game-container">
        <canvas id="paintCanvas" width="800" height="500"></canvas>
    </div>

    <div class="controls">
        <input type="color" id="colorPicker" class="color-picker" value="#ff0000">
        <input type="range" id="brushSize" min="1" max="20" value="5">
        <button class="btn-clear" onclick="clearCanvas()">Limpar Tela</button>
        <button style="background: #2ecc71; color: white;" onclick="downloadImage()">Salvar Obra</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
       
        let painting = false;

        // URLs de backgrounds temáticos (Substitua por imagens reais se preferir)
        const levels = [
            'https://images.unsplash.com/photo-1533109721025-d1ae7ee7c1e1?q=80&w=800', // Floresta/Toca
            'https://images.unsplash.com/photo-1520962880247-cfaf541c8724?q=80&w=800', // Chá
            'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=800', // Gato
            'https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=800', // Rainha
            'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?q=80&w=800'  // Tribunal
        ];

        function changeLevel(index) {
            canvas.style.backgroundImage = `url('${levels[index]}')`;
            clearCanvas();
        }

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'minha-obra-alice.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Iniciar com nível 1
        changeLevel(0);
    </script>
</body>
</html>
