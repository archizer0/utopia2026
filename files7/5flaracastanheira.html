<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice: Jogo Clássico</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
   
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Quicksand', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        /* Webcam com tamanho equilibrado */
        #video-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            height: 210px;
            border: 3px solid #ffd700;
            border-radius: 15px;
            overflow: hidden;
            transform: scaleX(-1);
            z-index: 30;
            background: #000;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 40;
            pointer-events: none;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            margin-bottom: 10px;
        }

        #start-screen {
            position: fixed;
            inset: 0;
            background: #2d132c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        .btn-start {
            background: #e94560;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="info-panel">
            <p class="text-sm opacity-80">Pontuação</p>
            <p id="score" class="text-4xl font-bold">0</p>
        </div>
        <div class="info-panel">
            <p id="status" class="text-lg">A aguardar câmara...</p>
        </div>
    </div>

    <div id="video-container">
        <video id="video-preview" autoplay playsinline></video>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen">
        <h1 class="text-6xl font-bold mb-6">Alice & O Coelho</h1>
        <p class="text-xl mb-8">Move a tua mão para controlar o Coelho Branco!</p>
        <button id="start-btn" class="btn-start">Jogar Agora</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video-preview');
    const scoreEl = document.getElementById('score');
    const statusEl = document.getElementById('status');
    const startScreen = document.getElementById('start-screen');

    let score = 0;
    let gameActive = false;

    // Definições normais
    const rabbit = { x: 0, y: 0, targetX: 0, targetY: 0, size: 100 };
    const queen = { x: 300, y: 300, vx: 5, vy: 5, size: 90 };

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // Desenha a Rainha de Copas de forma simples e visível
    function drawQueen(x, y, size) {
        ctx.save();
        ctx.translate(x, y);
       
        // Vestido
        ctx.fillStyle = "#ff1e56";
        ctx.beginPath();
        ctx.moveTo(0, -size/2);
        ctx.lineTo(-size/2, size/2);
        ctx.lineTo(size/2, size/2);
        ctx.fill();

        // Cabeça
        ctx.fillStyle = "#ffdbac";
        ctx.beginPath();
        ctx.arc(0, -size/4, size/4, 0, Math.PI*2);
        ctx.fill();

        // Coroa
        ctx.fillStyle = "#ffcc00";
        ctx.beginPath();
        ctx.moveTo(-size/6, -size/2);
        ctx.lineTo(0, -size/1.5);
        ctx.lineTo(size/6, -size/2);
        ctx.fill();

        ctx.restore();
    }

    // Desenha o Coelho Branco de forma simples
    function drawRabbit(x, y, size) {
        ctx.save();
        ctx.translate(x, y);
       
        // Orelhas
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.ellipse(-15, -size/2.5, 10, 25, 0, 0, Math.PI*2);
        ctx.ellipse(15, -size/2.5, 10, 25, 0, 0, Math.PI*2);
        ctx.fill();

        // Corpo
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(0, 0, size/3, 0, Math.PI*2);
        ctx.fill();

        // Casaco
        ctx.fillStyle = "#3a86ff";
        ctx.fillRect(-size/4, size/6, size/2, size/4);

        ctx.restore();
    }

    function update() {
        if (!gameActive) return;

        // Movimento suave do coelho
        rabbit.x += (rabbit.targetX - rabbit.x) * 0.15;
        rabbit.y += (rabbit.targetY - rabbit.y) * 0.15;

        // Movimento constante da rainha
        queen.x += queen.vx;
        queen.y += queen.vy;

        // Colisões com as bordas
        if (queen.x < 50 || queen.x > canvas.width - 50) queen.vx *= -1;
        if (queen.y < 50 || queen.y > canvas.height - 50) queen.vy *= -1;

        // Captura
        const dist = Math.hypot(rabbit.x - queen.x, rabbit.y - queen.y);
        if (dist < (rabbit.size + queen.size) / 2.5) {
            score++;
            scoreEl.innerText = score;
            queen.x = Math.random() * (canvas.width - 200) + 100;
            queen.y = Math.random() * (canvas.height - 200) + 100;
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = "#16213e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grelha de fundo discreta
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for(let i=0; i<canvas.width; i+=100) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=100) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        drawQueen(queen.x, queen.y, queen.size);
        drawRabbit(rabbit.x, rabbit.y, rabbit.size);
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
            const hand = results.multiHandLandmarks[0];
            rabbit.targetX = (1 - hand[9].x) * canvas.width;
            rabbit.targetY = hand[9].y * canvas.height;
            statusEl.innerText = "Mão detetada";
            statusEl.style.color = "#4ade80";
        } else {
            statusEl.innerText = "Procura-se mão...";
            statusEl.style.color = "#fb7185";
        }
    });

    const camera = new Camera(video, {
        onFrame: async () => { await hands.send({image: video}); },
        width: 640,
        height: 480
    });

    window.addEventListener('resize', init);
    init();

    document.getElementById('start-btn').onclick = () => {
        startScreen.style.display = 'none';
        camera.start().then(() => {
            gameActive = true;
            update();
        });
    };
</script>
</body>
</html>
