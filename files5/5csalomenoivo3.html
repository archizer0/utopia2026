<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice: O Pesadelo Realista - Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Fauna+One&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #020103;
            font-family: 'Fauna One', serif;
            touch-action: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: #fff;
            pointer-events: none;
            z-index: 20;
        }
        .score-display {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
       
        /* Estilo do Inventário */
        #inventory-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            z-index: 30;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .inventory-slot {
            width: 55px;
            height: 55px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            position: relative;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .inventory-slot.just-used {
            transform: scale(1.2);
            border-color: #fff;
            background: rgba(255,255,255,0.2);
        }
        .slot-key {
            position: absolute;
            top: -18px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        #damage-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 50%, rgba(239, 68, 68, 0.4) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #effect-label {
            position: absolute;
            bottom: 130px;
            width: 100%;
            text-align: center;
            font-family: 'Cinzel', serif;
            color: white;
            font-size: 1.4rem;
            text-shadow: 0 0 15px rgba(99, 102, 241, 1);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>

    <div id="damage-overlay"></div>
    <div id="effect-label"></div>

    <div id="ui">
        <div id="lives-container" class="flex gap-2"></div>
        <div class="text-center">
            <div id="score" class="score-display">0</div>
        </div>
        <div class="text-right opacity-40 text-[10px] tracking-[0.3em] uppercase">Use 1-5 para itens</div>
    </div>

    <div id="inventory-bar">
        <div class="inventory-slot" id="slot-0"><span class="slot-key">1</span></div>
        <div class="inventory-slot" id="slot-1"><span class="slot-key">2</span></div>
        <div class="inventory-slot" id="slot-2"><span class="slot-key">3</span></div>
        <div class="inventory-slot" id="slot-3"><span class="slot-key">4</span></div>
        <div class="inventory-slot" id="slot-4"><span class="slot-key">5</span></div>
    </div>

    <div id="menu" class="fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-50 p-6 text-center">
        <h1 class="text-6xl md:text-8xl font-black text-white mb-2 font-['Cinzel']">ALICE</h1>
        <p class="text-indigo-400 tracking-[0.3em] text-sm mb-12 uppercase">O Abismo dos Objetos</p>
        <button onclick="startGame()" class="px-16 py-4 border border-white/20 hover:border-indigo-500 hover:bg-indigo-500/10 text-white transition-all duration-700 tracking-[0.2em] uppercase text-sm">
            Iniciar Ascensão
        </button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesContainer = document.getElementById('lives-container');
        const damageOverlay = document.getElementById('damage-overlay');
        const effectLabel = document.getElementById('effect-label');

        let gameState = 'MENU';
        let score = 0;
        let time = 0;
        let inventory = [null, null, null, null, null];

        const config = {
            gravity: 0.5,
            jumpForce: -14,
            speed: 5.5,
            armySpeedStart: 1.6,
            playerW: 40,
            playerH: 80,
            maxLives: 3
        };

        const ITEM_TYPES = {
            CAKE: { color: '#f9a8d4', label: 'BOLO: GIGANTE!', icon: '🎂' },
            POTION: { color: '#818cf8', label: 'POÇÃO: LEVEZA', icon: '🧪' },
            POISON: { color: '#4d7c0f', label: 'MAÇÃ ENVENENADA!', icon: '🍏' },
            APPLE: { color: '#ef4444', label: 'MAÇÃ: REGENERAÇÃO', icon: '🍎' },
            CLOCK: { color: '#fbbf24', label: 'RELÓGIO: PARAR O TEMPO', icon: '⏳' }
        };

        let player = {
            x: 0, y: 0, vx: 0, vy: 0,
            baseW: config.playerW, baseH: config.playerH,
            w: config.playerW, h: config.playerH,
            scale: 1,
            grounded: false,
            facing: 1,
            anim: 0,
            lives: config.maxLives,
            invulnerable: 0,
            powerUp: null,
            powerUpTime: 0
        };

        let platforms = [];
        let items = [];
        let cameraY = 0;
        let armyY = 0;
        let armySpeed = config.armySpeedStart;
        let cardParticles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function showEffect(text) {
            effectLabel.innerText = text;
            effectLabel.style.opacity = '1';
            setTimeout(() => effectLabel.style.opacity = '0', 1500);
        }

        function updateUI() {
            // Corações
            livesContainer.innerHTML = '';
            for (let i = 0; i < config.maxLives; i++) {
                const heart = document.createElement('div');
                heart.style.width = '22px';
                heart.style.filter = i >= player.lives ? 'grayscale(1) opacity(0.2)' : 'drop-shadow(0 0 5px #ef4444)';
                heart.innerHTML = `<svg viewBox="0 0 24 24" fill="#ef4444"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                livesContainer.appendChild(heart);
            }

            // Slots de Inventário
            inventory.forEach((item, index) => {
                const slot = document.getElementById(`slot-${index}`);
                const existingIcon = slot.querySelector('.item-icon');
                if(existingIcon) existingIcon.remove();
               
                if (item) {
                    const span = document.createElement('span');
                    span.className = 'item-icon';
                    span.innerText = ITEM_TYPES[item].icon;
                    slot.appendChild(span);
                    slot.style.borderColor = 'rgba(255,255,255,0.3)';
                } else {
                    slot.style.borderColor = 'rgba(255,255,255,0.1)';
                }
            });
        }

        function addToInventory(type) {
            const firstEmpty = inventory.indexOf(null);
            if (firstEmpty !== -1) {
                inventory[firstEmpty] = type;
                updateUI();
                return true;
            }
            return false;
        }

        function useItem(index) {
            const type = inventory[index];
            if (!type) return;

            const slot = document.getElementById(`slot-${index}`);
            slot.classList.add('just-used');
            setTimeout(() => slot.classList.remove('just-used'), 300);

            inventory[index] = null;
            updateUI();
           
            const effect = ITEM_TYPES[type];
            showEffect(effect.label);
           
            switch(type) {
                case 'CAKE':
                    player.powerUp = 'CAKE';
                    player.scale = 2.2;
                    player.powerUpTime = 500;
                    break;
                case 'POTION':
                    player.powerUp = 'POTION';
                    player.scale = 0.45;
                    player.powerUpTime = 500;
                    break;
                case 'POISON':
                    takeDamage();
                    break;
                case 'APPLE':
                    if (player.lives < config.maxLives) player.lives++;
                    updateUI();
                    break;
                case 'CLOCK':
                    const oldSpeed = armySpeed;
                    armySpeed *= 0.1;
                    setTimeout(() => armySpeed = oldSpeed, 5000);
                    break;
            }
           
            player.w = player.baseW * player.scale;
            player.h = player.baseH * player.scale;
        }

        window.addEventListener('keydown', e => {
            if (e.key >= '1' && e.key <= '5') {
                useItem(parseInt(e.key) - 1);
            }
            keys[e.code] = true;
        });

        function addPlatform(y) {
            const w = 170 + Math.random() * 130;
            const x = Math.random() * (canvas.width - w);
            platforms.push({ x, y, w, h: 30 });

            if (Math.random() < 0.28) {
                const typeKeys = Object.keys(ITEM_TYPES);
                const type = typeKeys[Math.floor(Math.random() * typeKeys.length)];
                items.push({ x: x + w/2 - 15, y: y - 50, type, collected: false, floating: Math.random() * 10 });
            }
        }

        function initLevel() {
            platforms = []; items = []; cardParticles = [];
            cameraY = 0; score = 0; scoreElement.innerText = "0";
            inventory = [null, null, null, null, null];
            player.lives = config.maxLives;
            player.invulnerable = 0; player.scale = 1;
            player.w = config.playerW; player.h = config.playerH;
            player.powerUp = null;
            updateUI();

            platforms.push({ x: 0, y: canvas.height - 60, w: canvas.width, h: 200 });
            for (let i = 0; i < 18; i++) addPlatform(canvas.height - 220 - (i * 155));
           
            player.x = canvas.width / 2 - player.w/2;
            player.y = canvas.height - 200;
            armyY = canvas.height + 650;
            armySpeed = config.armySpeedStart;

            for(let i=0; i<45; i++) {
                cardParticles.push({ relX: Math.random() * canvas.width, relY: Math.random() * 450, rot: Math.random() * 6.28, type: Math.random() > 0.5 ? 'heart' : 'spade' });
            }
        }

        const keys = {};
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            initLevel();
            gameState = 'PLAYING';
            document.getElementById('menu').classList.add('hidden');
            requestAnimationFrame(update);
        }

        function takeDamage() {
            if (player.invulnerable > 0 || player.powerUp === 'CAKE') return;
            player.lives--;
            player.invulnerable = 100;
            updateUI();
            damageOverlay.style.opacity = '1';
            setTimeout(() => damageOverlay.style.opacity = '0', 250);
           
            if (player.lives <= 0) {
                gameState = 'MENU';
                document.getElementById('menu').classList.remove('hidden');
            } else {
                const safePlat = platforms.find(p => p.y < cameraY + canvas.height/2) || platforms[0];
                player.y = safePlat.y - player.h - 150;
                player.vy = 0; player.vx = 0;
            }
        }

        function drawAlice(x, y, scale, angle, anim) {
            if (player.invulnerable > 0 && Math.floor(time * 12) % 2 === 0) return;
            ctx.save();
            ctx.translate(x + player.w/2, y + player.h/2);
            ctx.scale(player.facing * scale * player.scale, scale * player.scale);
            ctx.rotate(angle);
           
            // Corpo e Pernas
            ctx.fillStyle = "#f1f5f9";
            ctx.fillRect(-6, 15 + Math.sin(anim)*6, 5, 20);
            ctx.fillRect(1, 15 - Math.sin(anim)*6, 5, 20);

            // Vestido
            const color = player.powerUp === 'CAKE' ? '#be185d' : '#1d4ed8';
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(-18, -8);
            ctx.bezierCurveTo(-28, 28, 28, 28, 18, -8);
            ctx.fill();

            // Avental
            ctx.fillStyle = "#fff";
            ctx.fillRect(-10, -5, 20, 18);
           
            // Cabelo
            ctx.fillStyle = "#d97706";
            ctx.beginPath(); ctx.arc(0, -24, 15, 0, Math.PI, true); ctx.fill();
           
            // Rosto
            ctx.fillStyle = "#fee2e2";
            ctx.beginPath(); ctx.arc(0, -22, 10, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            time += 0.05;

            if (player.invulnerable > 0) player.invulnerable--;
            if (player.powerUpTime > 0) {
                player.powerUpTime--;
                if (player.powerUpTime <= 0) {
                    player.powerUp = null; player.scale = 1;
                    player.w = player.baseW; player.h = player.baseH;
                }
            }

            let moveSpeed = player.powerUp === 'POTION' ? config.speed * 1.4 : config.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) { player.vx -= 0.85; player.facing = -1; }
            else if (keys['ArrowRight'] || keys['KeyD']) { player.vx += 0.85; player.facing = 1; }
            else { player.vx *= 0.82; }
            player.vx = Math.max(-moveSpeed, Math.min(moveSpeed, player.vx));

            if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
                player.vy = player.powerUp === 'POTION' ? config.jumpForce * 1.35 : config.jumpForce;
                player.grounded = false;
            }

            player.vy += config.gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Colisões de Plataforma
            player.grounded = false;
            platforms.forEach(p => {
                if (player.vy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.vy) {
                    player.y = p.y - player.h; player.vy = 0; player.grounded = true;
                }
            });

            // Recolha de Itens
            items.forEach(it => {
                if (!it.collected && player.x < it.x + 35 && player.x + player.w > it.x &&
                    player.y < it.y + 40 && player.y + player.h > it.y) {
                    if (addToInventory(it.type)) it.collected = true;
                }
            });

            cameraY += (player.y - canvas.height * 0.6 - cameraY) * 0.12;
            armyY -= armySpeed;
            armySpeed += 0.00035;

            let currentScore = Math.floor(Math.max(0, (canvas.height - 200 - player.y)/20));
            if (currentScore > score) {
                score = currentScore;
                scoreElement.innerText = score;
            }

            if (platforms[platforms.length-1].y > cameraY - 200) addPlatform(platforms[platforms.length-1].y - 155);
            if (player.y > armyY || player.y > cameraY + canvas.height + 150) takeDamage();

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#020105';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
           
            ctx.save();
            ctx.translate(0, -cameraY);

            // Desenhar Plataformas
            platforms.forEach(p => {
                const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
                grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(1, '#020617');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 10); ctx.fill();
                ctx.strokeStyle = "rgba(99, 102, 241, 0.25)"; ctx.stroke();
            });

            // Desenhar Itens no Mundo
            items.forEach(it => {
                if (it.collected) return;
                ctx.save();
                ctx.translate(it.x + 15, it.y + 15 + Math.sin(time*2.5 + it.floating)*10);
                ctx.shadowBlur = 15; ctx.shadowColor = ITEM_TYPES[it.type].color;
                ctx.font = "28px serif"; ctx.textAlign = "center";
                ctx.fillText(ITEM_TYPES[it.type].icon, 0, 0);
                ctx.restore();
            });

            drawAlice(player.x, player.y, 1, player.vx * 0.04, player.grounded ? (time * Math.abs(player.vx) * 0.6) : 0);

            // Exército (Massa de Cartas)
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(0, armyY + 50, canvas.width, 2500);
            cardParticles.forEach((card, i) => {
                ctx.save();
                ctx.translate(card.relX, armyY + card.relY + Math.sin(time + i)*12 - 25);
                ctx.rotate(card.rot + Math.sin(time*0.1)*0.2);
                ctx.fillStyle = "#fff"; ctx.fillRect(-12, -18, 24, 36);
                ctx.fillStyle = card.type === 'heart' ? "#900" : "#000";
                ctx.font = "14px serif"; ctx.textAlign = "center";
                ctx.fillText(card.type === 'heart' ? "♥" : "♠", 0, 5);
                ctx.restore();
            });

            ctx.restore();
        }

        initLevel();
        draw();
    </script>
</body>
</html>
