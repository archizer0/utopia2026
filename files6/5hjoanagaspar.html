<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gato de Cheshire: Head Control Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Mountains+of+Christmas:wght@700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #020005;
            color: white;
            font-family: 'Cinzel', serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #videoFeed {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            border: 2px solid var(--neon-cyan);
            transform: scaleX(-1);
            object-fit: cover;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(20, 0, 40, 0.9) 0%, #020005 100%);
            z-index: 100;
            backdrop-filter: blur(15px);
            transition: opacity 0.5s;
        }

        .hidden { opacity: 0; pointer-events: none; }

        .title-text {
            font-family: 'Mountains of Christmas', cursive;
            font-size: clamp(4rem, 12vw, 8rem);
            background: linear-gradient(to bottom, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.5));
        }

        .btn-start {
            border: 2px solid var(--neon-cyan);
            padding: 15px 40px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            background: transparent;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        #hud {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 50;
            pointer-events: none;
        }

        #statusMsg {
            position: fixed;
            bottom: 50px;
            width: 100%;
            text-align: center;
            font-family: 'Mountains of Christmas';
            font-size: 2.5rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #calibrationOverlay {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            background: rgba(0, 242, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            z-index: 11;
            pointer-events: none;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <video id="videoFeed" autoplay playsinline muted></video>
    <div id="calibrationOverlay">MOVE A CABEÇA PARA CONTROLAR</div>

    <div id="statusMsg">BEBE-ME!</div>

    <div id="hud" style="display: none;">
        <div class="text-xs opacity-50 tracking-widest uppercase">Pontos</div>
        <div id="scoreValue" class="text-6xl font-black italic">0</div>
        <div class="w-40 h-1 bg-white/10 mt-2 overflow-hidden rounded-full">
            <div id="frenzyFill" class="h-full w-0 bg-cyan-400 transition-all duration-300"></div>
        </div>
        <div class="text-[10px] opacity-40 mt-2 uppercase">Move a cabeça para os lados</div>
    </div>

    <div id="startScreen" class="ui-layer">
        <h1 class="title-text">Cheshire</h1>
        <p class="mb-10 tracking-[0.5em] text-cyan-300 opacity-60 uppercase text-sm">Controlo por Movimento</p>
        <button id="startBtn" class="btn-start">Ativar Câmara</button>
    </div>

    <div id="gameOverScreen" class="ui-layer hidden">
        <h2 class="text-4xl text-red-500 mb-4 uppercase">Fim da Ilusão</h2>
        <div id="finalScore" class="text-8xl font-black mb-10">0</div>
        <button id="restartBtn" class="btn-start">Recomeçar</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('videoFeed');
        const statusMsg = document.getElementById('statusMsg');
       
        // Canvas auxiliar para processamento de imagem
        const hiddenCanvas = document.createElement('canvas');
        const hctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
       
        let width, height, score = 0, level = 1, frameCount = 0;
        let isPlaying = false;
        let prevFrameData = null;
       
        const BASE_SIZE = 140;
        const player = {
            x: 0, targetX: 0, vx: 0, y: 0,
            size: BASE_SIZE,
            targetSize: BASE_SIZE
        };

        let items = [];
        let keys = {};

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            player.y = height - 150;
            if (!isPlaying) {
                player.x = width / 2;
                player.targetX = width / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Controlos de emergência (Setas)
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 160, height: 120 }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    hiddenCanvas.width = 160;
                    hiddenCanvas.height = 120;
                    document.getElementById('startScreen').classList.add('hidden');
                    document.getElementById('hud').style.display = 'block';
                    resetGame();
                };
            } catch(e) {
                alert("Precisas de permitir a câmara para este modo!");
            }
        };

        restartBtn.onclick = () => {
            document.getElementById('gameOverScreen').classList.add('hidden');
            resetGame();
        };

        function resetGame() {
            score = 0; level = 1; items = [];
            player.vx = 0;
            player.x = width / 2;
            player.targetX = width / 2;
            player.size = BASE_SIZE;
            player.targetSize = BASE_SIZE;
            isPlaying = true;
            document.getElementById('scoreValue').innerText = score;
            requestAnimationFrame(gameLoop);
        }

        // --- Lógica de Deteção de Movimento da Cabeça ---
        function processHeadMovement() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            hctx.drawImage(video, 0, 0, 160, 120);
            const currentFrame = hctx.getImageData(0, 0, 160, 120);
           
            if (prevFrameData) {
                let moveLeft = 0;
                let moveRight = 0;
                const threshold = 40; // Sensibilidade ao movimento

                // Comparamos zonas específicas (esquerda e direita da câmara)
                for (let i = 0; i < currentFrame.data.length; i += 16) { // Salta píxeis para performance
                    const diff = Math.abs(currentFrame.data[i] - prevFrameData.data[i]);
                    if (diff > threshold) {
                        const xPos = (i / 4) % 160;
                        // Invertido porque a câmara está em mirror
                        if (xPos < 80) moveRight++;
                        else moveLeft++;
                    }
                }

                // Aplicar movimento ao targetX
                const sensitivity = 0.8;
                if (moveLeft > moveRight + 50) player.targetX -= (moveLeft - moveRight) * sensitivity;
                if (moveRight > moveLeft + 50) player.targetX += (moveRight - moveLeft) * sensitivity;
            }
           
            prevFrameData = currentFrame;

            // Suporte adicional para teclas
            if (keys['ArrowLeft']) player.targetX -= 15;
            if (keys['ArrowRight']) player.targetX += 15;

            // Limites do ecrã
            player.targetX = Math.max(player.size/2, Math.min(width - player.size/2, player.targetX));
        }

        function showMessage(text) {
            statusMsg.innerText = text;
            statusMsg.style.opacity = 1;
            setTimeout(() => { statusMsg.style.opacity = 0; }, 2000);
        }

        function drawRealisticCheshire(x, y, size, tilt) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(tilt);
            const p = 1 + Math.sin(frameCount * 0.05) * 0.02;
            ctx.scale(p, p);

            // Orelhas
            ctx.fillStyle = "#1a0530";
            const drawEar = (s) => {
                ctx.beginPath();
                ctx.moveTo(s * size * 0.2, -size * 0.2);
                ctx.bezierCurveTo(s * size * 0.5, -size * 0.6, s * size * 0.6, -size * 0.3, s * size * 0.3, -size * 0.1);
                ctx.fill();
            };
            drawEar(-1); drawEar(1);

            // Corpo
            let bodyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.5);
            bodyGrad.addColorStop(0, '#5a2d8c');
            bodyGrad.addColorStop(0.7, '#2a0a4d');
            bodyGrad.addColorStop(1, '#05000a');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.5, size * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();

            // Olhos Turquesa
            const drawEye = (ox) => {
                ctx.save();
                ctx.translate(ox, -size * 0.1);
                ctx.shadowBlur = size * 0.18;
                ctx.shadowColor = "#00f2ff";
                ctx.fillStyle = "#00f2ff";
                ctx.beginPath(); ctx.arc(0, 0, size * 0.12, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#000";
                ctx.beginPath(); ctx.ellipse(0, 0, size * 0.02, size * 0.1, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.beginPath(); ctx.arc(-size * 0.04, -size * 0.04, size * 0.03, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            };
            drawEye(-size * 0.22); drawEye(size * 0.22);

            // Sorriso
            ctx.save();
            ctx.translate(0, size * 0.15);
            ctx.fillStyle = "#0a0015";
            ctx.beginPath();
            ctx.moveTo(-size * 0.38, 0);
            ctx.quadraticCurveTo(0, size * 0.4, size * 0.38, 0);
            ctx.quadraticCurveTo(0, size * 0.1, -size * 0.38, 0);
            ctx.fill();
            ctx.fillStyle = "#eee";
            for(let i = -12; i <= 12; i++) {
                let dx = i * (size * 0.03);
                let dy = Math.abs(i) * 0.6;
                ctx.beginPath();
                ctx.moveTo(dx - 1.5, 5 + dy);
                ctx.lineTo(dx, size * 0.12 + dy);
                ctx.lineTo(dx + 1.5, 5 + dy);
                ctx.fill();
            }
            ctx.restore();
            ctx.restore();
        }

        function gameLoop() {
            if (!isPlaying) return;
            frameCount++;

            processHeadMovement();

            // Física de suavização
            player.size += (player.targetSize - player.size) * 0.1;
            const dx = player.targetX - player.x;
            player.vx += dx * 0.05;
            player.vx *= 0.85;
            player.x += player.vx * 0.1;

            if (Math.random() < 0.03 + (level * 0.005)) spawnItem();

            updateEntities();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            const types = [
                {e:'🔮', t:'pts', s:4+level},
                {e:'🃏', t:'bad', s:5+level},
                {e:'🧪', t:'shrink', s:3},
                {e:'🧁', t:'grow', s:3},
                {e:'🍄', t:'reset', s:3}
            ];
            const r = Math.random();
            let type;
            if (r < 0.6) type = types[0];
            else if (r < 0.85) type = types[1];
            else if (r < 0.90) type = types[2];
            else if (r < 0.95) type = types[3];
            else type = types[4];
           
            items.push({ x: Math.random()*(width-100)+50, y: -50, ...type });
        }

        function updateEntities() {
            for (let i = items.length - 1; i >= 0; i--) {
                const it = items[i];
                it.y += it.s;
               
                if (Math.hypot(player.x - it.x, player.y - it.y) < player.size * 0.5) {
                    if (it.t === 'bad') { isPlaying = false; showGameOver(); return; }
                   
                    if (it.t === 'pts') score += 50 * (player.targetSize / BASE_SIZE);
                    else if (it.t === 'shrink') { player.targetSize = BASE_SIZE * 0.5; showMessage("ENCOLHESTE!"); }
                    else if (it.t === 'grow') { player.targetSize = BASE_SIZE * 2.5; showMessage("CRESCESTE!"); }
                    else if (it.t === 'reset') { player.targetSize = BASE_SIZE; showMessage("NORMAL!"); }
                   
                    items.splice(i, 1);
                    document.getElementById('scoreValue').innerText = Math.floor(score);
                    level = 1 + Math.floor(score / 2500);
                }
                if (it.y > height + 50) items.splice(i, 1);
            }
        }

        function showGameOver() {
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').innerText = Math.floor(score);
        }

        function draw() {
            ctx.fillStyle = "rgba(2, 0, 5, 0.4)";
            ctx.fillRect(0, 0, width, height);

            items.forEach(it => {
                ctx.font = "45px serif";
                ctx.textAlign = "center";
                ctx.fillText(it.e, it.x, it.y);
            });

            const tilt = Math.max(Math.min(player.vx * 0.005, 0.2), -0.2);
            drawRealisticCheshire(player.x, player.y, player.size, tilt);
        }
    </script>
</body>
</html>
