<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice no País das Maravilhas - Cascata AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Palatino', 'Georgia', serif;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        .instruction {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            backdrop-filter: blur(5px);
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #2d1b4d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #d4af37;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top-color: #d4af37;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner mb-4"></div>
        <h1 class="text-2xl font-bold">A abrir o buraco do coelho...</h1>
        <p class="mt-2 italic">Prepara-te para a Wonderland</p>
    </div>

    <div id="ui-overlay">
        <div class="instruction">
            <h2 class="text-xl font-bold">Wonderland AR</h2>
            <p>Usa as mãos e o rosto para interagir com os itens!</p>
        </div>
    </div>

    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');

        let items = [];
        const itemEmojis = ['🐇', '🎩', '☕', '🍄', '🃏', '🐱', '🌹', '🕰️', '🍰'];
       
        // Configuração do tamanho do canvas
        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FallingItem {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvasElement.width;
                this.y = -50 - Math.random() * 200;
                this.size = 30 + Math.random() * 40;
                this.emoji = itemEmojis[Math.floor(Math.random() * itemEmojis.length)];
                this.speedY = 2 + Math.random() * 4;
                this.speedX = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
                this.opacity = 0;
            }

            update(landmarks) {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotSpeed;
               
                if (this.opacity < 1) this.opacity += 0.05;

                // Interação com pontos de referência (Mãos e Rosto)
                if (landmarks) {
                    landmarks.forEach(point => {
                        const px = point.x * canvasElement.width;
                        const py = point.y * canvasElement.height;
                        const dist = Math.hypot(this.x - px, this.y - py);
                       
                        if (dist < this.size + 20) {
                            const angle = Math.atan2(this.y - py, this.x - px);
                            const force = 10;
                            this.speedX += Math.cos(angle) * force;
                            this.speedY += Math.sin(angle) * force;
                            this.rotSpeed += 0.2;
                        }
                    });
                }

                // Aplicar atrito para que não voem infinitamente
                this.speedX *= 0.95;
                if (this.speedY < 2) this.speedY += 0.1;

                if (this.y > canvasElement.height + 100) {
                    this.reset();
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
               
                // Desenhar sombra mágica
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(212, 175, 55, 0.5)';
               
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // Inicializar itens
        for (let i = 0; i < 25; i++) {
            items.push(new FallingItem());
        }

        let currentLandmarks = [];

        function onResults(results) {
            if (loadingScreen.style.display !== 'none') {
                loadingScreen.style.display = 'none';
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
           
            // Desenhar o vídeo (espelhado)
            canvasCtx.scale(-1, 1);
            canvasCtx.translate(-canvasElement.width, 0);
            canvasCtx.globalAlpha = 0.8;
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();

            // Recolher pontos de interação (mãos e rosto)
            let interactionPoints = [];
           
            if (results.leftHandLandmarks) {
                results.leftHandLandmarks.forEach(l => interactionPoints.push({x: 1-l.x, y: l.y}));
            }
            if (results.rightHandLandmarks) {
                results.rightHandLandmarks.forEach(l => interactionPoints.push({x: 1-l.x, y: l.y}));
            }
            if (results.faceLandmarks) {
                // Usar apenas alguns pontos do rosto para performance
                [1, 4, 152, 234, 454].forEach(idx => {
                    const l = results.faceLandmarks[idx];
                    interactionPoints.push({x: 1-l.x, y: l.y});
                });
            }

            // Atualizar e desenhar itens
            items.forEach(item => {
                item.update(interactionPoints);
                item.draw(canvasCtx);
            });

            // Opcional: Desenhar guias sutis para as mãos
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#d4af37';
            if (results.leftHandLandmarks) drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#d4af37', lineWidth: 1});
            if (results.rightHandLandmarks) drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#d4af37', lineWidth: 1});
        }

        const holistic = new Holistic({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
            }
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
       
        // Iniciar
        window.onload = () => {
            camera.start().catch(err => {
                console.error("Erro ao aceder à câmara:", err);
                alert("Por favor, permite o acesso à câmara para veres a magia!");
            });
        };

        // Helper: Script da Câmara (MediaPipe utils)
        function Camera(videoElement, options) {
            this.videoElement = videoElement;
            this.options = options;
            this.start = async function() {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: options.width, height: options.height }
                });
                this.videoElement.srcObject = stream;
                this.videoElement.play();
                const step = async () => {
                    await options.onFrame();
                    requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            };
        }
    </script>
</body>
</html>
