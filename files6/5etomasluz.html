<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô do País das Maravilhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        body {
            font-family: 'Lora', serif;
            /* Fundo mágico inspirado no País das Maravilhas */
            background: radial-gradient(circle at center, #2a0845 0%, #6441A5 100%);
            color: #fdfbf7;
            overflow-x: hidden;
        }

        h1, h2, .title-font {
            font-family: 'Cinzel', serif;
        }

        /* Chão de xadrez em perspectiva */
        .checkerboard {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            background-image:
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-color: #fff;
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            opacity: 0.3;
            z-index: -1;
        }

        /* Animações das Mãos */
        .hand {
            font-size: 6rem;
            transition: all 0.3s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        @media (min-width: 768px) {
            .hand { font-size: 8rem; }
        }

        .flip-horizontal {
            transform: scaleX(-1);
        }

        @keyframes shakePlayer {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-10deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-20px) rotate(-10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        @keyframes shakeComputer {
            0% { transform: scaleX(-1) translateY(0) rotate(0deg); }
            25% { transform: scaleX(-1) translateY(-20px) rotate(10deg); }
            50% { transform: scaleX(-1) translateY(0) rotate(0deg); }
            75% { transform: scaleX(-1) translateY(-20px) rotate(10deg); }
            100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
        }

        .animating-player {
            animation: shakePlayer 0.5s ease-in-out infinite;
        }

        .animating-computer {
            animation: shakeComputer 0.5s ease-in-out infinite;
        }

        /* Botões de Escolha */
        .choice-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }
       
        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px) scale(1.05);
            border-color: #fca5a5;
            box-shadow: 0 10px 25px rgba(252, 165, 165, 0.3);
        }

        .choice-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
       
        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between relative pb-10">
   
    <!-- Fundo -->
    <div class="checkerboard"></div>

    <!-- Cabeçalho -->
    <header class="text-center pt-8 pb-4 z-10 w-full max-w-4xl px-4">
        <h1 class="text-3xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 mb-2 drop-shadow-lg">
            As Mãos das Maravilhas
        </h1>
        <p class="text-sm md:text-lg text-purple-200 italic">Desafie o Gato de Cheshire em um duelo de magia!</p>
    </header>

    <!-- Placar e Status -->
    <div class="w-full max-w-3xl px-4 z-10 flex flex-col items-center">
        <div class="glass-panel w-full p-4 mb-6 flex justify-between items-center shadow-2xl">
            <div class="text-center w-1/3">
                <p class="text-xl md:text-2xl title-font font-bold text-blue-300">Alice (Você)</p>
                <p class="text-4xl font-bold" id="player-score">0</p>
            </div>
            <div class="text-center w-1/3 flex flex-col items-center">
                <span id="cat-face" class="text-5xl mb-2 transition-all duration-300">😸</span>
                <span class="text-xs uppercase tracking-widest text-purple-300">Placar</span>
            </div>
            <div class="text-center w-1/3">
                <p class="text-xl md:text-2xl title-font font-bold text-pink-400">Gato</p>
                <p class="text-4xl font-bold" id="computer-score">0</p>
            </div>
        </div>

        <div class="h-16 flex items-center justify-center text-center px-4 w-full">
            <p id="status-message" class="text-lg md:text-xl font-bold text-yellow-300 drop-shadow-md">
                Escolha sua jogada para começar!
            </p>
        </div>
    </div>

    <!-- Área de Batalha (Mãos) -->
    <div class="flex-grow flex items-center justify-center w-full max-w-4xl px-4 z-10 my-8">
        <div class="flex justify-between items-center w-full max-w-md">
            <!-- Mão do Jogador -->
            <div id="player-hand" class="hand">🤜</div>
           
            <div class="text-3xl font-bold text-purple-400 opacity-50 px-4 title-font">VS</div>
           
            <!-- Mão do Computador -->
            <div id="computer-hand" class="hand flip-horizontal">🤛</div>
        </div>
    </div>

    <!-- Controles -->
    <div class="w-full max-w-2xl px-4 z-10">
        <div class="grid grid-cols-3 gap-3 md:gap-6">
            <button onclick="play('rock')" class="choice-btn p-3 md:p-4 rounded-xl flex flex-col items-center group" id="btn-rock">
                <span class="text-4xl md:text-5xl mb-2">✊</span>
                <span class="font-bold text-sm md:text-base title-font group-hover:text-pink-300">Cogumelo</span>
                <span class="text-xs text-gray-300 hidden md:block mt-1">Pedra</span>
            </button>
            <button onclick="play('paper')" class="choice-btn p-3 md:p-4 rounded-xl flex flex-col items-center group" id="btn-paper">
                <span class="text-4xl md:text-5xl mb-2">✋</span>
                <span class="font-bold text-sm md:text-base title-font group-hover:text-pink-300">Carta</span>
                <span class="text-xs text-gray-300 hidden md:block mt-1">Papel</span>
            </button>
            <button onclick="play('scissors')" class="choice-btn p-3 md:p-4 rounded-xl flex flex-col items-center group" id="btn-scissors">
                <span class="text-4xl md:text-5xl mb-2">✌️</span>
                <span class="font-bold text-sm md:text-base title-font group-hover:text-pink-300">Espada</span>
                <span class="text-xs text-gray-300 hidden md:block mt-1">Tesoura</span>
            </button>
        </div>
        <div class="mt-6 text-center">
            <button onclick="resetGame()" class="text-sm text-purple-300 hover:text-white underline decoration-purple-500 transition-colors">
                Beber a poção do esquecimento (Zerar Placar)
            </button>
        </div>
    </div>

    <script>
        // Configuração do Jogo
        const CHOICES = {
            rock: {
                emoji: '✊',
                name: 'Cogumelo Mágico',
                beats: 'scissors',
                winMsg: 'O Cogumelo Mágico cresceu e quebrou a Espada Vorpal!',
                loseMsg: 'A Carta de Copas embrulhou seu Cogumelo Mágico!'
            },
            paper: {
                emoji: '✋',
                name: 'Carta de Copas',
                beats: 'rock',
                winMsg: 'A Carta de Copas da Rainha embrulhou o Cogumelo!',
                loseMsg: 'A Espada Vorpal cortou sua Carta de Copas em pedaços!'
            },
            scissors: {
                emoji: '✌️',
                name: 'Espada Vorpal',
                beats: 'paper',
                winMsg: '"Cortem-lhe a cabeça!" A Espada fatiou a Carta de Copas!',
                loseMsg: 'A Espada Vorpal quebrou ao bater no Cogumelo Mágico!'
            }
        };

        const EMOJI_NEUTRAL_PLAYER = '🤜';
        const EMOJI_NEUTRAL_COMPUTER = '🤛';

        // Estado do Jogo
        let playerScore = 0;
        let computerScore = 0;
        let isPlaying = false;

        // Elementos do DOM
        const playerHandEl = document.getElementById('player-hand');
        const computerHandEl = document.getElementById('computer-hand');
        const playerScoreEl = document.getElementById('player-score');
        const computerScoreEl = document.getElementById('computer-score');
        const statusMessageEl = document.getElementById('status-message');
        const catFaceEl = document.getElementById('cat-face');
        const buttons = document.querySelectorAll('.choice-btn');

        function setButtonsState(disabled) {
            buttons.forEach(btn => btn.disabled = disabled);
        }

        function play(playerChoice) {
            if (isPlaying) return;
            isPlaying = true;

            // Resetar para as mãos fechadas antes de animar
            playerHandEl.textContent = EMOJI_NEUTRAL_PLAYER;
            computerHandEl.textContent = EMOJI_NEUTRAL_COMPUTER;
            statusMessageEl.textContent = "O Gato está pensando...";
            statusMessageEl.className = "text-lg md:text-xl font-bold text-gray-300 drop-shadow-md";
            catFaceEl.textContent = '😼'; // Cara de suspense

            // Desabilitar botões
            setButtonsState(true);

            // Iniciar animação
            playerHandEl.classList.add('animating-player');
            computerHandEl.classList.add('animating-computer');

            // Gerar escolha do computador
            const choicesKeys = Object.keys(CHOICES);
            const computerChoice = choicesKeys[Math.floor(Math.random() * choicesKeys.length)];

            // Aguardar 1.5s (animação) e resolver
            setTimeout(() => {
                // Parar animação
                playerHandEl.classList.remove('animating-player');
                computerHandEl.classList.remove('animating-computer');

                // Mostrar escolhas
                playerHandEl.textContent = CHOICES[playerChoice].emoji;
                computerHandEl.textContent = CHOICES[computerChoice].emoji;

                // Determinar vencedor
                resolveWinner(playerChoice, computerChoice);

                isPlaying = false;
                setButtonsState(false);
            }, 1500);
        }

        function resolveWinner(player, computer) {
            if (player === computer) {
                statusMessageEl.textContent = `Empate! Ambos escolheram ${CHOICES[player].name}.`;
                statusMessageEl.className = "text-lg md:text-xl font-bold text-yellow-300 drop-shadow-md";
                catFaceEl.textContent = '😸';
                return;
            }

            const playerWins = CHOICES[player].beats === computer;

            if (playerWins) {
                playerScore++;
                playerScoreEl.textContent = playerScore;
                statusMessageEl.textContent = `Alice Venceu! ${CHOICES[player].winMsg}`;
                statusMessageEl.className = "text-lg md:text-xl font-bold text-green-400 drop-shadow-md scale-105 transition-transform";
                catFaceEl.textContent = '😿'; // Gato triste
            } else {
                computerScore++;
                computerScoreEl.textContent = computerScore;
                statusMessageEl.textContent = `O Gato Venceu! ${CHOICES[player].loseMsg}`;
                statusMessageEl.className = "text-lg md:text-xl font-bold text-red-400 drop-shadow-md scale-105 transition-transform";
                catFaceEl.textContent = '😈'; // Gato malvado
            }
        }

        function resetGame() {
            if (isPlaying) return;
            playerScore = 0;
            computerScore = 0;
            playerScoreEl.textContent = '0';
            computerScoreEl.textContent = '0';
            playerHandEl.textContent = EMOJI_NEUTRAL_PLAYER;
            computerHandEl.textContent = EMOJI_NEUTRAL_COMPUTER;
            statusMessageEl.textContent = "A poção fez efeito. Tudo foi esquecido! Escolha sua jogada.";
            statusMessageEl.className = "text-lg md:text-xl font-bold text-yellow-300 drop-shadow-md";
            catFaceEl.textContent = '😸';
        }
    </script>
</body>
</html>
