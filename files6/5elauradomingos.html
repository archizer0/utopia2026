<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Lab - IA & Física</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animação suave para os botões */
        .pulse-btn {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        /* Efeito de filtro para o vídeo parecer um laboratório de testes */
        #webcam {
            filter: grayscale(40%) contrast(120%) brightness(90%);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 font-sans">

    <!-- Cabeçalho -->
    <header class="text-center mb-8">
        <h1 class="text-3xl sm:text-5xl font-black mb-2 flex items-center justify-center gap-3 italic tracking-wider">
            <svg class="w-8 h-8 sm:w-12 sm:h-12 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
            CAMERA LAB AI
        </h1>
        <p class="text-slate-400">Laboratório de simulação física controlado por voz.</p>
    </header>

    <!-- Contentor Principal (Vídeo + Canvas) -->
    <div class="relative w-full max-w-3xl aspect-video bg-black rounded-3xl overflow-hidden border-4 border-slate-700 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
       
        <!-- Feed da Webcam -->
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover opacity-80"></video>
       
        <!-- Tela de Física (Desenhada por cima do vídeo) -->
        <canvas id="physics-canvas" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>

        <!-- Ecrã de Início / Botão Ativar -->
        <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-10 transition-opacity duration-500">
            <svg class="w-20 h-20 text-blue-500 mb-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-full font-bold tracking-widest text-lg shadow-lg hover:shadow-blue-500/50 transition-all hover:scale-105">
                ATIVAR SISTEMA
            </button>
        </div>
    </div>

    <!-- Mensagens de Estado UI (Substitui os alerts) -->
    <div id="status-message" class="mt-6 min-h-[40px] text-center font-medium text-lg px-4 py-2 rounded-lg opacity-0 transition-opacity duration-300">
        <!-- O texto aparecerá aqui -->
    </div>

    <!-- Controlos de Voz -->
    <div class="mt-4 flex flex-col items-center gap-4">
        <button id="mic-btn" disabled class="flex items-center gap-3 px-8 py-4 rounded-2xl font-bold transition-all bg-slate-700 text-slate-400 cursor-not-allowed">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <span id="mic-text">CÂMARA DESATIVADA</span>
        </button>
        <p class="text-slate-400 text-sm sm:text-base text-center max-w-lg">
            Dica: Diz algo como <span class="text-blue-400 italic font-medium">"Lança uma bola cor-de-rosa"</span> ou <span class="text-green-400 italic font-medium">"Cria um cubo verde enorme"</span>.
        </p>
    </div>

    <script>
        // --- 1. CONFIGURAÇÕES E VARIÁVEIS GLOBAIS ---
        const apiKey = ""; // A chave da API é fornecida automaticamente pelo ambiente
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('physics-canvas');
        const ctx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const micBtn = document.getElementById('mic-btn');
        const micText = document.getElementById('mic-text');
        const statusMessage = document.getElementById('status-message');

        // Estado da aplicação
        let isStreaming = false;
        let isListening = false;
        let physicsObjects = [];
       
        // Constantes da Física
        const GRAVITY = 0.6;
        const BOUNCE = 0.75; // Perda de energia ao bater no chão
        const FLOOR_OFFSET = 20; // O chão fica um pouco acima do limite do vídeo

        // --- 2. SISTEMA DE MENSAGENS UI ---
        function showMessage(text, type = 'info') {
            statusMessage.textContent = text;
            statusMessage.className = `mt-6 min-h-[40px] text-center font-medium text-lg px-6 py-2 rounded-lg transition-opacity duration-300 opacity-100 ${
                type === 'error' ? 'bg-red-900/50 text-red-200 border border-red-800' :
                type === 'success' ? 'bg-green-900/50 text-green-200 border border-green-800' :
                'bg-blue-900/50 text-blue-200 border border-blue-800'
            }`;
           
            // Ocultar automaticamente após 4 segundos se não for erro grave
            if (type !== 'error') {
                setTimeout(() => {
                    statusMessage.classList.remove('opacity-100');
                    statusMessage.classList.add('opacity-0');
                }, 4000);
            }
        }

        // --- 3. MOTOR DE FÍSICA E RENDERIZAÇÃO (CANVAS) ---
        function resizeCanvas() {
            // Ajustar o canvas ao tamanho real em que o vídeo está a ser exibido
            canvasElement.width = videoElement.clientWidth || 800;
            canvasElement.height = videoElement.clientHeight || 600;
        }

        function gameLoop() {
            if (!isStreaming) return;

            // Limpar o frame anterior
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            const floorY = canvasElement.height - FLOOR_OFFSET;

            // Atualizar e desenhar cada objeto
            for (let i = physicsObjects.length - 1; i >= 0; i--) {
                let obj = physicsObjects[i];

                // Aplicar gravidade
                obj.vy += GRAVITY;
               
                // Atualizar posição
                obj.x += obj.vx;
                obj.y += obj.vy;

                // Colisão com o chão
                if (obj.y + obj.size > floorY) {
                    obj.y = floorY - obj.size;
                    obj.vy = -obj.vy * BOUNCE;
                   
                    // Fricção simples no chão
                    obj.vx *= 0.95;
                }

                // Colisão com as paredes laterais (Ressalto)
                if (obj.x < 0) {
                    obj.x = 0;
                    obj.vx = Math.abs(obj.vx) * 0.8;
                } else if (obj.x + obj.size > canvasElement.width && obj.shape === 'square') {
                     obj.x = canvasElement.width - obj.size;
                     obj.vx = -Math.abs(obj.vx) * 0.8;
                } else if (obj.x + (obj.size/2) > canvasElement.width && obj.shape === 'circle') {
                     obj.x = canvasElement.width - (obj.size/2);
                     obj.vx = -Math.abs(obj.vx) * 0.8;
                }

                // Desenhar com base na forma
                ctx.fillStyle = obj.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = obj.color;

                ctx.beginPath();
                if (obj.shape === 'circle') {
                    // Para o círculo, o X e Y são o centro
                    ctx.arc(obj.x + obj.size/2, obj.y + obj.size/2, obj.size/2, 0, Math.PI * 2);
                } else {
                    // Quadrado
                    // Adicionar uma pequena rotação baseada na velocidade X (efeito visual)
                    ctx.save();
                    ctx.translate(obj.x + obj.size/2, obj.y + obj.size/2);
                    ctx.rotate(obj.vx * 0.05);
                    ctx.fillRect(-obj.size/2, -obj.size/2, obj.size, obj.size);
                    ctx.restore();
                }
               
                // Se o shape for circle preenchemos aqui (se for square o fillRect já preencheu, mas não faz mal)
                if(obj.shape === 'circle') ctx.fill();
                ctx.closePath();

                // Reset sombra
                ctx.shadowBlur = 0;

                // Remover objetos que por algum motivo tenham saído completamente do ecrã (limpeza de memória)
                if (obj.y > canvasElement.height + 100) {
                    physicsObjects.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function spawnObject(shape, color) {
            const size = Math.random() * 30 + 30; // Tamanho entre 30 e 60
            const startX = Math.random() * (canvasElement.width - 100) + 50;
           
            physicsObjects.push({
                x: startX,
                y: -50, // Começa acima do ecrã
                vx: (Math.random() - 0.5) * 15, // Velocidade horizontal aleatória
                vy: 0,
                color: color,
                shape: shape,
                size: size
            });
            showMessage(`Objeto gerado: ${shape === 'circle' ? 'Bola' : 'Cubo'} com a cor ${color}`, 'success');
        }

        // --- 4. GESTÃO DA WEBCAM ---
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" }
                });
                videoElement.srcObject = stream;
               
                // Esperar que o vídeo tenha metadados para saber o tamanho exato
                videoElement.onloadedmetadata = () => {
                    isStreaming = true;
                    startOverlay.classList.add('opacity-0');
                    setTimeout(() => startOverlay.classList.add('hidden'), 500); // Esconder após transição
                   
                    resizeCanvas();
                    window.addEventListener('resize', resizeCanvas); // Adaptar ao redimensionar janela
                   
                    requestAnimationFrame(gameLoop); // Iniciar o motor de física
                   
                    // Ativar botão de microfone
                    micBtn.disabled = false;
                    micBtn.classList.remove('bg-slate-700', 'text-slate-400', 'cursor-not-allowed');
                    micBtn.classList.add('bg-white', 'text-black', 'hover:scale-105');
                    micText.textContent = 'FALAR COM A IA';
                   
                    showMessage("Sistema ativado com sucesso!", "success");
                };
            } catch (err) {
                console.error("Erro de câmara:", err);
                showMessage("Erro ao aceder à câmara. Verifique as permissões do browser.", "error");
            }
        });

        // --- 5. INTEGRAÇÃO GEMINI API (NLP) ---
        async function processVoiceCommand(transcript) {
            showMessage(`A analisar comando: "${transcript}"...`);
           
            // Lógica obrigatória de Exponential Backoff (reintentos)
            const delays = [1000, 2000, 4000, 8000, 16000];
           
            const payload = {
                contents: [{ parts: [{ text: transcript }] }],
                systemInstruction: {
                    parts: [{ text: `És o motor cerebral de um laboratório de física.
                    Analisa o pedido do utilizador (em português de Portugal).
                    Se ele quiser criar/lançar um objeto geométrico, deves devolver EXATAMENTE UM JSON válido e mais nada.
                    Identifica a forma ("circle" para bolas/esferas/círculos, "square" para quadrados/cubos/caixas). O padrão é "circle".
                    Identifica a cor mencionada e devolve-a em código HEX (ex: "#FF0000" para vermelho). O padrão é "#3B82F6" (azul).
                   
                    A resposta TEM de respeitar este esquema JSON:
                    {"shape": "circle", "color": "#00FF00"}
                   
                    Se o utilizador não estiver a pedir para criar nada relacionado com formas ou objetos, devolve apenas:
                    {"error": true}` }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            shape: { type: "STRING" },
                            color: { type: "STRING" },
                            error: { type: "BOOLEAN" }
                        }
                    }
                }
            };

            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
                   
                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                   
                    if (!resultText) throw new Error("Resposta da IA vazia");

                    const aiDecision = JSON.parse(resultText);

                    if (aiDecision.error) {
                         showMessage("Comando não reconhecido como criação de objeto. Tenta 'Lança uma bola'.", "info");
                    } else if (aiDecision.shape) {
                         spawnObject(aiDecision.shape, aiDecision.color || '#ffffff');
                    }
                    return; // Sucesso, sair do loop de tentativas
                   
                } catch (error) {
                    if (i === delays.length) {
                        console.error("Falha final na API:", error);
                        showMessage("O cérebro da IA não respondeu após várias tentativas. Tenta novamente.", "error");
                        return;
                    }
                    // Esperar antes de tentar novamente (Exponential Backoff)
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // --- 6. RECONHECIMENTO DE VOZ (Web Speech API) ---
        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showMessage("O teu browser não suporta reconhecimento de voz (usa o Chrome ou Edge).", "error");
                micBtn.style.display = 'none';
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-PT'; // Configurado para Português de Portugal
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            micBtn.addEventListener('click', () => {
                if (isListening) {
                    recognition.stop();
                    return;
                }
                try {
                    recognition.start();
                } catch(e) {
                    console.error("Erro ao iniciar microfone", e);
                }
            });

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.remove('bg-white', 'text-black');
                micBtn.classList.add('bg-red-500', 'text-white', 'pulse-btn');
                micText.textContent = 'A OUVIR...';
                showMessage("Podes falar. Estou a ouvir...", "info");
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                processVoiceCommand(transcript);
            };

            recognition.onerror = (event) => {
                console.error("Erro de voz:", event.error);
                if (event.error !== 'aborted') {
                     showMessage(`Erro no microfone: ${event.error}`, "error");
                }
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('bg-red-500', 'text-white', 'pulse-btn');
                micBtn.classList.add('bg-white', 'text-black');
                micText.textContent = 'FALAR COM A IA';
            };
        }

        // Inicializar configuração de voz
        setupSpeechRecognition();

    </script>
</body>
</html>
