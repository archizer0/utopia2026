<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Lane: Alice no País das Maravilhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Crimson Pro', serif;
            background-color: #1a1a2e;
            background-image: radial-gradient(circle at center, #2a1b3d 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .title-font {
            font-family: 'Playfair Display', serif;
        }

        /* Estilo das Cartas */
        .memory-card {
            aspect-ratio: 2/3;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-radius: 0.75rem;
        }

        .memory-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            border: 3px solid #d4af37; /* Dourado */
        }

        /* Verso da Carta (Escondido) */
        .card-back {
            background: linear-gradient(135deg, #4b0082 0%, #000000 100%);
            background-image: url('https://www.transparenttextures.com/patterns/poker-qr.png');
            color: #d4af37;
            font-size: 2.5rem;
        }

        /* Frente da Carta (Personagem) */
        .card-front {
            background-color: #f5f5f5;
            transform: rotateY(180deg);
            font-size: 3rem;
        }

        .matched .card-inner {
            animation: pulse 0.5s ease-in-out;
            border-color: #4ade80;
        }

        @keyframes pulse {
            0% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.1) rotateY(180deg); }
            100% { transform: scale(1) rotateY(180deg); }
        }

        .custom-button {
            background: linear-gradient(to right, #d4af37, #b8860b);
            transition: all 0.3s ease;
        }

        .custom-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Cabeçalho -->
        <header class="text-center mb-8">
            <h1 class="title-font text-4xl md:text-6xl text-yellow-500 mb-2 italic">Alice no País das Maravilhas</h1>
            <p class="text-lg opacity-80 italic">"Até onde vai a toca do coelho?"</p>
        </header>

        <!-- Painel de Status -->
        <div class="flex flex-wrap justify-center gap-6 mb-8 bg-black/40 p-4 rounded-xl border border-yellow-900/30">
            <div class="text-center">
                <p class="text-xs uppercase tracking-widest text-yellow-500">Jogadas</p>
                <p id="moves" class="text-2xl font-bold">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs uppercase tracking-widest text-yellow-500">Pares</p>
                <p id="matches" class="text-2xl font-bold">0/8</p>
            </div>
            <div class="text-center">
                <button onclick="resetGame()" class="custom-button px-6 py-2 rounded-full text-black font-bold uppercase text-sm">
                    Reiniciar Chá
                </button>
            </div>
        </div>

        <!-- Tabuleiro -->
        <div id="game-board" class="grid grid-cols-4 gap-3 md:gap-4 sm:grid-cols-4 lg:grid-cols-4 max-w-2xl mx-auto">
            <!-- As cartas serão geradas aqui pelo JS -->
        </div>

        <!-- Mensagem de Vitória -->
        <div id="win-message" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6 text-center">
            <div class="bg-gray-900 p-8 rounded-2xl border-2 border-yellow-500 max-w-sm">
                <h2 class="title-font text-3xl text-yellow-500 mb-4">Parabéns!</h2>
                <p class="mb-6">Você não está louco, ou talvez esteja... mas você venceu o jogo!</p>
                <p id="final-stats" class="mb-6 font-bold"></p>
                <button onclick="resetGame()" class="custom-button w-full py-3 rounded-lg text-black font-bold uppercase">
                    Jogar Novamente
                </button>
            </div>
        </div>
    </div>

    <script>
        const characters = [
            { id: 1, icon: '👧', name: 'Alice' },
            { id: 2, icon: '🐇', name: 'Coelho Branco' },
            { id: 3, icon: '🎩', name: 'Chapeleiro' },
            { id: 4, icon: '😺', name: 'Gato de Cheshire' },
            { id: 5, icon: '👸', name: 'Rainha de Copas' },
            { id: 6, icon: '🍄', name: 'Cogumelo' },
            { id: 7, icon: '☕', name: 'Xícara de Chá' },
            { id: 8, icon: '🃏', name: 'Soldado Carta' }
        ];

        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let isLocking = false;

        const board = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');
        const matchesDisplay = document.getElementById('matches');
        const winMessage = document.getElementById('win-message');
        const finalStats = document.getElementById('final-stats');

        function initGame() {
            // Criar pares e embaralhar
            const gameIcons = [...characters, ...characters];
            cards = shuffle(gameIcons);
           
            board.innerHTML = '';
            cards.forEach((char, index) => {
                const cardElement = createCardElement(char, index);
                board.appendChild(cardElement);
            });

            moves = 0;
            matches = 0;
            updateDisplay();
            winMessage.classList.add('hidden');
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createCardElement(char, index) {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = char.id;
            card.dataset.index = index;
           
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back">♠</div>
                    <div class="card-front">${char.icon}</div>
                </div>
            `;

            card.addEventListener('click', () => handleCardClick(card));
            return card;
        }

        function handleCardClick(card) {
            if (isLocking || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                updateDisplay();
                checkForMatch();
            }
        }

        function checkForMatch() {
            isLocking = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.id === card2.dataset.id) {
                // Deu Match
                card1.classList.add('matched');
                card2.classList.add('matched');
                matches++;
                flippedCards = [];
                isLocking = false;
                updateDisplay();
               
                if (matches === characters.length) {
                    showWin();
                }
            } else {
                // Não deu Match
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocking = false;
                }, 1000);
            }
        }

        function updateDisplay() {
            movesDisplay.innerText = moves;
            matchesDisplay.innerText = `${matches}/${characters.length}`;
        }

        function showWin() {
            finalStats.innerText = `Você completou o jogo em ${moves} jogadas!`;
            winMessage.classList.remove('hidden');
        }

        function resetGame() {
            board.innerHTML = '';
            flippedCards = [];
            isLocking = false;
            initGame();
        }

        // Iniciar
        window.onload = initGame;
    </script>
</body>
</html>
