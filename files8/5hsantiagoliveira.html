<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice no País das Maravilhas - O Jogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 4px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            background: #2c003e;
            max-width: 100%;
            max-height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 class="text-2xl font-bold">Alice no País das Maravilhas</h1>
        <p class="text-lg">Pontos: <span id="score">0</span></p>
        <p class="text-sm italic" id="status-msg">Encontre o Coelho Branco!</p>
    </div>

    <div class="controls-hint">
        Use as setas para mover e pular | 'C' para comer bolo (Crescer) | 'B' para beber poção (Encolher)
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const statusMsg = document.getElementById('status-msg');

        // Configurações do jogo
        canvas.width = 800;
        canvas.height = 600;

        const GRAVITY = 0.5;
        let score = 0;

        // Estado do Jogador
        const player = {
            x: 50,
            y: 400,
            width: 40,
            height: 60,
            color: '#3498db', // Vestido azul da Alice
            vx: 0,
            vy: 0,
            jumpPower: -12,
            isGrounded: false,
            scale: 1, // 1: Normal, 0.5: Pequena, 1.5: Grande
            targetScale: 1
        };

        // Elementos do Cenário
        const platforms = [
            { x: 0, y: 550, width: 2000, height: 50, color: '#2ecc71' }, // Chão
            { x: 200, y: 450, width: 150, height: 20, color: '#8e44ad' },
            { x: 450, y: 350, width: 150, height: 20, color: '#8e44ad' },
            { x: 100, y: 250, width: 150, height: 20, color: '#8e44ad' },
            { x: 600, y: 200, width: 200, height: 20, color: '#8e44ad' },
            { x: 900, y: 400, width: 150, height: 20, color: '#8e44ad' },
        ];

        const collectibles = [
            { x: 250, y: 410, type: 'cake', collected: false, color: '#f1c40f' }, // Bolo
            { x: 150, y: 210, type: 'potion', collected: false, color: '#e74c3c' }, // Poção
            { x: 700, y: 160, type: 'tea', collected: false, color: '#ecf0f1' } // Chá (ponto)
        ];

        const enemies = [
            { x: 500, y: 520, width: 30, height: 40, vx: 2, range: 100, startX: 500 }
        ];

        // Teclado
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Lógica de escala
        window.addEventListener('keydown', e => {
            if (e.code === 'KeyC') player.targetScale = 1.8; // Crescer
            if (e.code === 'KeyB') player.targetScale = 0.5; // Encolher
        });

        function update() {
            // Movimentação
            if (keys['ArrowLeft']) player.vx = -5;
            else if (keys['ArrowRight']) player.vx = 5;
            else player.vx *= 0.8;

            if (keys['ArrowUp'] && player.isGrounded) {
                player.vy = player.jumpPower * (player.scale > 1 ? 0.8 : 1.1);
                player.isGrounded = false;
            }

            // Aplicar gravidade
            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            // Suavizar mudança de tamanho
            player.scale += (player.targetScale - player.scale) * 0.1;
            const currentWidth = 40 * player.scale;
            const currentHeight = 60 * player.scale;

            // Colisões com plataformas
            player.isGrounded = false;
            platforms.forEach(p => {
                if (player.x < p.x + p.width &&
                    player.x + currentWidth > p.x &&
                    player.y + currentHeight > p.y &&
                    player.y + currentHeight < p.y + p.height + 10 &&
                    player.vy >= 0) {
                    player.y = p.y - currentHeight;
                    player.vy = 0;
                    player.isGrounded = true;
                }
            });

            // Colisões com itens
            collectibles.forEach(c => {
                if (!c.collected &&
                    player.x < c.x + 20 && player.x + currentWidth > c.x &&
                    player.y < c.y + 20 && player.y + currentHeight > c.y) {
                    c.collected = true;
                    score += 10;
                    scoreElement.innerText = score;
                   
                    if (c.type === 'cake') statusMsg.innerText = "Você cresceu! Use 'B' para voltar ao normal.";
                    if (c.type === 'potion') statusMsg.innerText = "Você encolheu! Consegue passar por buracos pequenos.";
                }
            });

            // Inimigos
            enemies.forEach(en => {
                en.x += en.vx;
                if (Math.abs(en.x - en.startX) > en.range) en.vx *= -1;

                // Colisão com inimigo
                if (player.x < en.x + en.width && player.x + currentWidth > en.x &&
                    player.y < en.y + en.height && player.y + currentHeight > en.y) {
                    // Reset simples se tocar
                    player.x = 50;
                    player.y = 400;
                    statusMsg.innerText = "As cartas te pegaram!";
                }
            });

            // Limites da tela
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - currentWidth) player.x = canvas.width - currentWidth;
            if (player.y > canvas.height) {
                player.x = 50;
                player.y = 400;
                statusMsg.innerText = "Cuidado com o abismo!";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar fundo (estilo surrealista)
            ctx.fillStyle = '#3d0052';
            ctx.beginPath();
            ctx.arc(700, 100, 80, 0, Math.PI * 2);
            ctx.fill();

            // Desenhar plataformas
            platforms.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.width, p.height);
                // Detalhe de grama/textura
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(p.x, p.y, p.width, 5);
            });

            // Desenhar itens
            collectibles.forEach(c => {
                if (!c.collected) {
                    ctx.fillStyle = c.color;
                    ctx.beginPath();
                    if (c.type === 'cake') {
                        ctx.rect(c.x, c.y, 20, 20);
                    } else if (c.type === 'potion') {
                        ctx.moveTo(c.x + 10, c.y);
                        ctx.lineTo(c.x + 20, c.y + 20);
                        ctx.lineTo(c.x, c.y + 20);
                    } else {
                        ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI * 2);
                    }
                    ctx.fill();
                    ctx.closePath();
                }
            });

            // Desenhar inimigos (Cartas de Copas)
            enemies.forEach(en => {
                ctx.fillStyle = 'white';
                ctx.fillRect(en.x, en.y, en.width, en.height);
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 2;
                ctx.strokeRect(en.x, en.y, en.width, en.height);
                ctx.fillStyle = 'red';
                ctx.font = '12px Arial';
                ctx.fillText('♥', en.x + 10, en.y + 25);
            });

            // Desenhar Alice
            const curW = 40 * player.scale;
            const curH = 60 * player.scale;
           
            // Sombra
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(player.x + 5, player.y + 5, curW, curH);

            // Vestido
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y + (curH * 0.4), curW, curH * 0.6);
           
            // Cabeça
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(player.x + (curW * 0.2), player.y, curW * 0.6, curH * 0.4);
           
            // Cabelo (Loiro)
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(player.x + (curW * 0.2), player.y, curW * 0.6, curH * 0.15);

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            update();
            draw();
        }

        // Início
        window.onload = () => {
            statusMsg.innerText = "Bem-vinda, Alice. Coma o bolo ou beba a poção!";
            gameLoop();
        };

    </script>
</body>
</html>
