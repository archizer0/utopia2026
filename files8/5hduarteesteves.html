<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Resgate da Alice: O Castelo Gigante</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #333;
            z-index: 10;
            pointer-events: none;
            width: 320px;
        }
        .msg-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 24px;
            border: 3px solid #ff69b4;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        #instructions-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #ffffff 0%, #a0d8ef 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1a365d;
            z-index: 100;
        }
        .key-hint {
            display: inline-block;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 5px 12px;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
            margin: 0 4px;
        }
        #objective-msg {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 105, 180, 0.9);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            display: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="instructions-overlay">
        <h1 class="text-6xl font-black mb-4 text-pink-500 text-center">O CASTELO GIGANTE</h1>
        <p class="text-2xl mb-10 font-medium text-blue-700 text-center">Sobe as escadas para salvar a Alice!</p>
        <div class="bg-white/90 p-10 rounded-3xl border-4 border-pink-200 shadow-2xl text-center space-y-6">
            <div class="text-lg"><span class="key-hint">↑</span> Mover | <span class="key-hint">←</span> <span class="key-hint">→</span> Virar</div>
            <p class="text-gray-600 max-w-md">Entra no castelo e sobe a grande escadaria em caracol até ao telhado.</p>
            <button onclick="startGame()" class="mt-4 px-12 py-4 bg-pink-500 text-white text-xl font-black rounded-full hover:bg-pink-600 hover:scale-105 transition-all pointer-events-auto">COMEÇAR</button>
        </div>
    </div>

    <div id="ui">
        <div id="main-box" class="msg-box">
            <h2 class="text-2xl font-black mb-1 text-pink-600 italic">OPERAÇÃO RESGATE</h2>
            <p id="status-text" class="text-sm font-bold text-blue-600 mt-2">Caminha até ao castelo...</p>
           
            <div class="mt-4">
                <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase">
                    <span>Altitude</span>
                    <span id="alt-text">0m / 80m</span>
                </div>
                <div class="h-2 w-full bg-gray-200 rounded-full mt-1 overflow-hidden">
                    <div id="alt-bar" class="h-full bg-pink-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="objective-msg">A PORTA ESTÁ ALI! ENTRA NO CASTELO!</div>

    <script>
        let scene, camera, renderer, clock;
        let rabbit, castle, castleBody, alice;
        let gameActive = false;
        let insideCastle = false;
       
        const keys = { forward: false, backward: false, left: false, right: false };
        let moveSpeed = 0;
        let rotationSpeed = 0;
       
        const CASTLE_HEIGHT = 80;
        const CASTLE_RADIUS = 12;
        const START_Z = -100;

        function startGame() {
            document.getElementById('instructions-overlay').style.display = 'none';
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 60, 350);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            // Chão do jardim
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshPhongMaterial({ color: 0x7cfc00 }));
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Castelo
            castle = new THREE.Group();
            const wallMat = new THREE.MeshPhongMaterial({
                color: 0xfffafa,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 1.0
            });
           
            castleBody = new THREE.Mesh(
                new THREE.CylinderGeometry(CASTLE_RADIUS, CASTLE_RADIUS, CASTLE_HEIGHT, 24, 1, true),
                wallMat
            );
            castleBody.position.y = CASTLE_HEIGHT / 2;
            castle.add(castleBody);

            // Telhado do topo
            const roof = new THREE.Mesh(new THREE.CircleGeometry(CASTLE_RADIUS + 0.5, 24), new THREE.MeshPhongMaterial({color: 0xff69b4}));
            roof.rotation.x = -Math.PI/2;
            roof.position.y = CASTLE_HEIGHT + 0.1;
            castle.add(roof);

            // Escadaria em caracol
            const stepGeo = new THREE.BoxGeometry(6, 0.6, 2.5);
            const stepMat = new THREE.MeshPhongMaterial({color: 0xe0e0e0});
            for(let i=0; i < 150; i++) {
                const step = new THREE.Mesh(stepGeo, stepMat);
                const angle = i * 0.25;
                const radius = CASTLE_RADIUS - 3;
                step.position.set(Math.cos(angle) * radius, i * 0.55, Math.sin(angle) * radius);
                step.rotation.y = -angle;
                castle.add(step);
            }

            castle.position.set(0, 0, START_Z);
            scene.add(castle);

            // Alice no topo
            alice = new THREE.Group();
            const dress = new THREE.Mesh(new THREE.ConeGeometry(0.8, 2, 12), new THREE.MeshPhongMaterial({color: 0x3b82f6}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45), new THREE.MeshPhongMaterial({color: 0xffdbac}));
            head.position.y = 1.6;
            alice.add(dress, head);
            alice.position.set(0, CASTLE_HEIGHT + 0.2, START_Z);
            scene.add(alice);

            // Coelho
            rabbit = new THREE.Group();
            const rBody = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
            rabbit.add(rBody);
            rabbit.position.y = 0.6;
            scene.add(rabbit);

            window.addEventListener('keydown', (e) => handleKey(e, true));
            window.addEventListener('keyup', (e) => handleKey(e, false));

            clock = new THREE.Clock();
            gameActive = true;
            animate();
        }

        function handleKey(e, isPressed) {
            switch(e.key.toLowerCase()) {
                case 'arrowup': case 'w': keys.forward = isPressed; break;
                case 'arrowdown': case 's': keys.backward = isPressed; break;
                case 'arrowleft': case 'a': keys.left = isPressed; break;
                case 'arrowright': case 'd': keys.right = isPressed; break;
            }
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Movimento
            const maxSpeed = insideCastle ? 0.25 : 0.45;
            if(keys.forward) moveSpeed = THREE.MathUtils.lerp(moveSpeed, maxSpeed, 0.1);
            else if(keys.backward) moveSpeed = THREE.MathUtils.lerp(moveSpeed, -0.2, 0.1);
            else moveSpeed = THREE.MathUtils.lerp(moveSpeed, 0, 0.15);

            if(keys.left) rotationSpeed = THREE.MathUtils.lerp(rotationSpeed, 0.07, 0.1);
            else if(keys.right) rotationSpeed = THREE.MathUtils.lerp(rotationSpeed, -0.07, 0.1);
            else rotationSpeed = THREE.MathUtils.lerp(rotationSpeed, 0, 0.2);

            rabbit.rotation.y += rotationSpeed;
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(rabbit.quaternion);
            rabbit.position.add(dir.multiplyScalar(moveSpeed));

            const distToCastle = rabbit.position.distanceTo(new THREE.Vector3(0, 0, START_Z));
           
            if(!insideCastle) {
                // Exterior
                rabbit.position.y = 0.6 + Math.abs(Math.sin(time * 10)) * (moveSpeed * 2.5);
                if(distToCastle < 25) document.getElementById('objective-msg').style.display = 'block';
               
                if(distToCastle < (CASTLE_RADIUS + 1)) {
                    insideCastle = true;
                    document.getElementById('objective-msg').style.display = 'none';
                    document.getElementById('status-text').innerText = "A subir as escadas...";
                    rabbit.position.set(CASTLE_RADIUS - 3, 0.6, START_Z);
                    rabbit.rotation.y = Math.PI;
                    castleBody.material.opacity = 0.4; // Visibilidade através da parede
                }
            } else {
                // Interior - Subida das escadas
                const dx = rabbit.position.x;
                const dz = rabbit.position.z - START_Z;
                const radius = CASTLE_RADIUS - 3.5;
                const currentDist = Math.sqrt(dx*dx + dz*dz);
               
                // Mantém o coelho no caminho circular da escada
                rabbit.position.x = (dx / currentDist) * radius;
                rabbit.position.z = START_Z + (dz / currentDist) * radius;

                // Sobe enquanto se move
                if(keys.forward) rabbit.position.y += 0.15;
                if(keys.backward) rabbit.position.y = Math.max(0.6, rabbit.position.y - 0.15);

                // UI de altitude
                const altProgress = (rabbit.position.y / CASTLE_HEIGHT) * 100;
                document.getElementById('alt-bar').style.width = `${altProgress}%`;
                document.getElementById('alt-text').innerText = `${Math.floor(rabbit.position.y)}m / ${CASTLE_HEIGHT}m`;
            }

            // Câmara de acompanhamento
            const camOffset = insideCastle ?
                new THREE.Vector3(0, 6, -10).applyQuaternion(rabbit.quaternion) :
                new THREE.Vector3(0, 8, -18).applyQuaternion(rabbit.quaternion);
           
            camera.position.lerp(rabbit.position.clone().add(camOffset), 0.1);
            camera.lookAt(rabbit.position.clone().add(new THREE.Vector3(0, 1, 4).applyQuaternion(rabbit.quaternion)));

            // Vitória
            if(insideCastle && rabbit.position.y >= CASTLE_HEIGHT - 0.5) {
                gameActive = false;
                alert("VITÓRIA! Chegaste ao topo do castelo e salvaste a Alice!");
                location.reload();
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
