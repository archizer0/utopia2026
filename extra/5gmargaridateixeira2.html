<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtros Faciais Divertidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Usando uma distribuição estável do face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .video-container {
            position: relative;
            border: 4px solid #6366f1;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #000;
        }
        video, canvas {
            width: 640px;
            height: 480px;
            max-width: 100%;
            border-radius: 1rem;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* Não interfere nos cliques */
        }
        /* Espelhamento para parecer um espelho real */
        .mirror {
            transform: scaleX(-1);
        }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold mb-2 bg-gradient-to-r from-indigo-400 to-fuchsia-400 bg-clip-text text-transparent">
            Filtros IA em Tempo Real
        </h1>
        <p class="text-slate-400">Deteção facial avançada no browser</p>
    </div>

    <!-- Ecrã de Carregamento -->
    <div id="loading-screen" class="flex flex-col items-center gap-4">
        <div class="loader"></div>
        <p id="status" class="animate-pulse">A inicializar inteligência artificial...</p>
    </div>

    <div id="game-container" class="hidden flex flex-col items-center w-full max-w-3xl">
        <div class="video-container shadow-2xl mb-6">
            <video id="video" class="mirror" autoplay muted playsinline></video>
            <canvas id="overlay" class="mirror"></canvas>
        </div>

        <div class="grid grid-cols-3 sm:grid-cols-6 gap-3 w-full">
            <button onclick="setFilter('none')" class="bg-slate-700 p-3 rounded-xl hover:bg-slate-600 transition">Off</button>
            <button onclick="setFilter('party')" class="bg-indigo-600 p-3 rounded-xl hover:bg-indigo-500 transition">Festa 🕶️</button>
            <button onclick="setFilter('emoji')" class="bg-yellow-600 p-3 rounded-xl hover:bg-yellow-500 transition">Emoji 😂</button>
            <button onclick="setFilter('makeup')" class="bg-rose-600 p-3 rounded-xl hover:bg-rose-500 transition">Batom 💄</button>
            <button onclick="setFilter('pop')" class="bg-emerald-600 p-3 rounded-xl hover:bg-emerald-500 transition">PopArt 🎨</button>
            <button onclick="setFilter('sketch')" class="bg-pink-600 p-3 rounded-xl hover:bg-pink-500 transition">Arte ✍️</button>
        </div>

        <div id="filter-display" class="mt-6 text-indigo-300 font-mono text-sm uppercase tracking-widest">
            Filtro Ativo: Nenhum
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const loadingScreen = document.getElementById('loading-screen');
        const gameContainer = document.getElementById('game-container');
        const filterDisplay = document.getElementById('filter-display');
       
        let currentFilter = 'none';

        // Inicialização
        async function setup() {
            try {
                // Link para modelos hospedados publicamente (essencial para face-api.js)
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights/';
               
                statusText.innerText = "A descarregar modelos (2MB~)...";
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

                statusText.innerText = "A ligar câmara...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;

                video.addEventListener('play', () => {
                    const displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(overlay, displaySize);
                   
                    loadingScreen.classList.add('hidden');
                    gameContainer.classList.remove('hidden');
                   
                    startDetection(displaySize);
                });

            } catch (err) {
                statusText.innerHTML = `<span class="text-red-400">Erro: ${err.message}</span><br><small>Certifica-te que usas HTTPS ou localhost.</small>`;
                console.error(err);
            }
        }

        function setFilter(f) {
            currentFilter = f;
            filterDisplay.innerText = `Filtro Ativo: ${f}`;
            overlay.style.filter = f === 'pop' ? 'saturate(2.5) contrast(1.1)' : 'none';
        }

        async function startDetection(displaySize) {
            const ctx = overlay.getContext('2d');

            async function render() {
                if (video.paused || video.ended) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceExpressions();

                const resized = faceapi.resizeResults(detections, displaySize);
               
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                if (currentFilter !== 'none') {
                    resized.forEach(det => {
                        if (currentFilter === 'party') drawParty(ctx, det);
                        if (currentFilter === 'emoji') drawEmoji(ctx, det);
                        if (currentFilter === 'makeup') drawMakeup(ctx, det);
                        if (currentFilter === 'pop') drawPop(ctx, det);
                        if (currentFilter === 'sketch') drawSketch(ctx, det);
                    });
                }

                requestAnimationFrame(render);
            }
            render();
        }

        function drawParty(ctx, det) {
            const marks = det.landmarks;
            const leftEye = marks.getLeftEye();
            const rightEye = marks.getRightEye();
           
            const width = Math.abs(rightEye[3].x - leftEye[0].x) * 2.2;
            const x = (leftEye[0].x + rightEye[3].x) / 2 - width / 2;
            const y = (leftEye[0].y + rightEye[3].y) / 2 - 20;

            ctx.fillStyle = 'black';
            ctx.beginPath();
            // Desenho simplificado de óculos escuros
            ctx.fillRect(x, y, width, 40);
            ctx.fillStyle = 'white';
            ctx.fillRect(x + 5, y + 5, 20, 5); // Reflexo
            ctx.fillRect(x + width - 25, y + 5, 20, 5);
        }

        function drawEmoji(ctx, det) {
            const exp = det.expressions;
            const box = det.detection.box;
            let emoji = '😐';
            if (exp.happy > 0.4) emoji = '😊';
            if (exp.happy > 0.8) emoji = '😂';
            if (exp.surprised > 0.4) emoji = '😲';
            if (exp.angry > 0.4) emoji = '😠';

            ctx.font = `${box.width}px serif`;
            ctx.textAlign = 'center';
            ctx.fillText(emoji, box.x + box.width/2, box.y + box.height/1.5);
        }

        function drawMakeup(ctx, det) {
            const mouth = det.landmarks.getMouth();
            ctx.fillStyle = 'rgba(255, 0, 80, 0.5)';
            ctx.beginPath();
            mouth.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.closePath();
            ctx.fill();
           
            // Blush
            ctx.fillStyle = 'rgba(255, 150, 150, 0.3)';
            const left = det.landmarks.getPositions()[13];
            const right = det.landmarks.getPositions()[3];
            ctx.beginPath(); ctx.arc(left.x, left.y, 25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(right.x, right.y, 25, 0, Math.PI*2); ctx.fill();
        }

        function drawPop(ctx, det) {
            const jaw = det.landmarks.getJawOutline();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 6;
            ctx.beginPath();
            jaw.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();

            // Retícula (pontos)
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            const box = det.detection.box;
            for(let i=0; i<box.width; i+=12) {
                for(let j=0; j<box.height; j+=12) {
                    ctx.beginPath();
                    ctx.arc(box.x + i, box.y + j, 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        function drawSketch(ctx, det) {
            const points = det.landmarks.getPositions();
            ctx.strokeStyle = '#f472b6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            points.forEach((p, i) => {
                if (i % 3 === 0) {
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + (Math.random()-0.5)*15, p.y + (Math.random()-0.5)*15);
                }
            });
            ctx.stroke();
        }

        window.onload = setup;
    </script>
</body>
</html>
