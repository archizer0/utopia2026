<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista o Coelho Branco</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0914;
            font-family: 'Playfair Display', serif;
            user-select: none;
            color: #fff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(20, 15, 25, 0.85);
            border: 2px solid #d4af37; /* Dourado */
            border-radius: 15px;
            padding: 20px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        h1 {
            text-align: center;
            color: #d4af37;
            font-size: 24px;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            border-bottom: 1px solid #d4af37;
            padding-bottom: 15px;
        }

        .category {
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 16px;
            color: #e0d0a6;
            margin-bottom: 10px;
            font-style: italic;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            background: linear-gradient(135deg, #4a0e17 0%, #2a0810 100%);
            border: 1px solid #d4af37;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-grow: 1;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
        }

        button:hover {
            background: linear-gradient(135deg, #6b1522 0%, #3d0b17 100%);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        button.active {
            background: linear-gradient(135deg, #d4af37 0%, #b5952f 100%);
            color: #1a1a1a;
            border-color: #fff;
            font-weight: bold;
            text-shadow: none;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            font-size: 14px;
            color: #e0d0a6;
            pointer-events: none;
        }

        .card-suit {
            font-size: 20px;
            margin: 0 5px;
            color: #d4af37;
        }

        /* Cores específicas para botões de colete */
        #btn-vest-red.active { background: #8B0000; color: white; }
        #btn-vest-blue.active { background: #00008B; color: white; }
        #btn-vest-green.active { background: #006400; color: white; }

    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <h1><span class="card-suit">♠</span> O Coelho Branco <span class="card-suit">♥</span></h1>
       
        <div class="category">
            <div class="category-title">Colete (Estou atrasado!)</div>
            <div class="btn-group">
                <button id="btn-vest-none" class="active" onclick="changeVest('none')">Nenhum</button>
                <button id="btn-vest-red" onclick="changeVest('red')">Vermelho</button>
                <button id="btn-vest-blue" onclick="changeVest('blue')">Azul</button>
                <button id="btn-vest-green" onclick="changeVest('green')">Verde</button>
            </div>
        </div>

        <div class="category">
            <div class="category-title">Acessórios de Cabeça</div>
            <div class="btn-group">
                <button id="btn-hat" onclick="toggleHat()">Cartola do Chapeleiro</button>
            </div>
        </div>

        <div class="category">
            <div class="category-title">Rosto</div>
            <div class="btn-group">
                <button id="btn-glasses" onclick="toggleGlasses()">Óculos Redondos</button>
            </div>
        </div>

        <div class="category">
            <div class="category-title">Tempo</div>
            <div class="btn-group">
                <button id="btn-watch" onclick="toggleWatch()">Relógio de Bolso</button>
            </div>
        </div>
    </div>

    <div id="instructions">
        Arraste com o rato para rodar <span class="card-suit">♦</span> Use a roda para fazer zoom
    </div>

    <!-- Importar Three.js e OrbitControls (Atualizado para a versão r140 para suportar CapsuleGeometry) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Variáveis globais
        let scene, camera, renderer, controls;
        let rabbitGroup, breathingTime = 0;
       
        // Elementos de vestuário
        let vestMesh, hatGroup, glassesGroup, watchGroup;

        // Materiais
        const materials = {
            whiteFur: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, metalness: 0.1 }),
            pinkInner: new THREE.MeshStandardMaterial({ color: 0xffb6c1, roughness: 0.6 }),
            blackEye: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.3, metalness: 0.8 }),
            glass: new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, opacity: 1, transparent: true, roughness: 0.1 }),
            hatFabric: new THREE.MeshStandardMaterial({ color: 0x1a3320, roughness: 0.9 }), // Verde muito escuro
            ribbon: new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.7 }), // Vermelho escuro
            vestRed: new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.8 }),
            vestBlue: new THREE.MeshStandardMaterial({ color: 0x102050, roughness: 0.8 }),
            vestGreen: new THREE.MeshStandardMaterial({ color: 0x1e4020, roughness: 0.8 })
        };

        window.onload = function() {
            init();
            animate();
        };

        function init() {
            // 1. Configurar Cena
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0d0914, 0.02); // Nevoeiro mágico

            // 2. Configurar Câmara
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 5, 15);

            // 3. Configurar Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // 4. Configurar Controlos
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.minDistance = 5;
            controls.maxDistance = 25;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // Não ir muito abaixo do chão
            controls.target.set(0, 3, 0);
            controls.update();

            // 5. Iluminação Mágica
            const ambientLight = new THREE.AmbientLight(0x404060, 1.5); // Luz azulada
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const backLight = new THREE.PointLight(0x8a2be2, 2, 50); // Luz roxa de trás
            backLight.position.set(-5, 5, -5);
            scene.add(backLight);

            // 6. Criar Chão (Padrão de Xadrez - País das Maravilhas)
            createFloor();

            // 7. Criar o Coelho
            createRabbit();

            // Evento de redimensionamento
            window.addEventListener('resize', onWindowResize, false);
        }

        function createFloor() {
            // Criar textura de xadrez usando Canvas
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
           
            // Fundo escuro
            ctx.fillStyle = '#1a1525';
            ctx.fillRect(0, 0, 512, 512);
           
            // Quadrados claros (dourado escurecido)
            ctx.fillStyle = '#2d2518';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillRect(256, 256, 256, 256);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10);

            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.2, // Chão refletivo
                metalness: 0.1
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Adicionar algumas cartas flutuantes no fundo
            createFloatingCards();
        }

        function createFloatingCards() {
            const cardGeo = new THREE.PlaneGeometry(0.8, 1.2);
            const cardMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide });
           
            for(let i=0; i<15; i++) {
                const card = new THREE.Mesh(cardGeo, cardMat);
                card.position.set(
                    (Math.random() - 0.5) * 30,
                    Math.random() * 10 + 2,
                    (Math.random() - 0.5) * 30 - 10
                );
                card.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
               
                // Animação customizada nos dados do objeto
                card.userData = {
                    rotSpeed: (Math.random() - 0.5) * 0.05,
                    floatSpeed: Math.random() * 0.02 + 0.01,
                    startY: card.position.y
                };
               
                scene.add(card);
            }
        }

        function createRabbit() {
            rabbitGroup = new THREE.Group();
           
            // --- CORPO BASE ---
           
            // Tronco
            const bodyGeo = new THREE.CylinderGeometry(1.2, 1.8, 3.5, 32);
            const body = new THREE.Mesh(bodyGeo, materials.whiteFur);
            body.position.y = 2.5;
            body.castShadow = true;
            rabbitGroup.add(body);

            // Cabeça
            const headGeo = new THREE.SphereGeometry(1.4, 32, 32);
            const head = new THREE.Mesh(headGeo, materials.whiteFur);
            head.position.y = 5.2;
            head.castShadow = true;
            rabbitGroup.add(head);

            // Focinho e Nariz
            const snoutGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const snout = new THREE.Mesh(snoutGeo, materials.whiteFur);
            snout.position.set(0, 5.0, 1.2);
            snout.scale.set(1.2, 0.8, 1);
            rabbitGroup.add(snout);

            const noseGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const nose = new THREE.Mesh(noseGeo, materials.pinkInner);
            nose.position.set(0, 5.1, 1.8);
            rabbitGroup.add(nose);

            // Olhos
            const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const eyeR = new THREE.Mesh(eyeGeo, materials.blackEye);
            eyeR.position.set(0.5, 5.4, 1.15);
            rabbitGroup.add(eyeR);
           
            const eyeL = new THREE.Mesh(eyeGeo, materials.blackEye);
            eyeL.position.set(-0.5, 5.4, 1.15);
            rabbitGroup.add(eyeL);

            // Orelhas
            const earGeo = new THREE.CapsuleGeometry(0.3, 2, 16, 16);
           
            const earR = new THREE.Mesh(earGeo, materials.whiteFur);
            earR.position.set(0.6, 7.0, 0);
            earR.rotation.z = -0.2;
            earR.castShadow = true;
            rabbitGroup.add(earR);

            const earInnerR = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 1.8, 8, 8), materials.pinkInner);
            earInnerR.position.set(0.6, 7.0, 0.2);
            earInnerR.rotation.z = -0.2;
            rabbitGroup.add(earInnerR);

            const earL = new THREE.Mesh(earGeo, materials.whiteFur);
            earL.position.set(-0.6, 7.0, 0);
            earL.rotation.z = 0.2;
            earL.castShadow = true;
            rabbitGroup.add(earL);

            const earInnerL = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 1.8, 8, 8), materials.pinkInner);
            earInnerL.position.set(-0.6, 7.0, 0.2);
            earInnerL.rotation.z = 0.2;
            rabbitGroup.add(earInnerL);

            // Braços
            const armGeo = new THREE.CapsuleGeometry(0.35, 1.5, 16, 16);
            const armR = new THREE.Mesh(armGeo, materials.whiteFur);
            armR.position.set(1.6, 3.0, 0);
            armR.rotation.z = 0.5;
            armR.castShadow = true;
            rabbitGroup.add(armR);

            const armL = new THREE.Mesh(armGeo, materials.whiteFur);
            armL.position.set(-1.6, 3.0, 0);
            armL.rotation.z = -0.5;
            armL.castShadow = true;
            rabbitGroup.add(armL);

            // Pernas
            const legGeo = new THREE.CapsuleGeometry(0.4, 1.2, 16, 16);
            const legR = new THREE.Mesh(legGeo, materials.whiteFur);
            legR.position.set(0.8, 0.8, 0);
            legR.castShadow = true;
            rabbitGroup.add(legR);

            const legL = new THREE.Mesh(legGeo, materials.whiteFur);
            legL.position.set(-0.8, 0.8, 0);
            legL.castShadow = true;
            rabbitGroup.add(legL);

            // Pés
            const footGeo = new THREE.CapsuleGeometry(0.4, 0.8, 16, 16);
            const footR = new THREE.Mesh(footGeo, materials.whiteFur);
            footR.position.set(0.8, 0.2, 0.4);
            footR.rotation.x = Math.PI / 2;
            footR.castShadow = true;
            rabbitGroup.add(footR);

            const footL = new THREE.Mesh(footGeo, materials.whiteFur);
            footL.position.set(-0.8, 0.2, 0.4);
            footL.rotation.x = Math.PI / 2;
            footL.castShadow = true;
            rabbitGroup.add(footL);

            // Cauda (Pom-pom)
            const tailGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const tail = new THREE.Mesh(tailGeo, materials.whiteFur);
            tail.position.set(0, 1.5, -1.8);
            rabbitGroup.add(tail);

            // --- CRIAR ROUPAS (Inicialmente invisíveis ou default) ---

            // Colete (Cilindro aberto à frente)
            // Parametros: radiusTop, radiusBottom, height, radialSegments, heightSegments, openEnded, thetaStart, thetaLength
            const vestGeo = new THREE.CylinderGeometry(1.3, 1.9, 3.2, 32, 1, false, -Math.PI/2 + 0.5, Math.PI * 2 - 1.0);
            vestMesh = new THREE.Mesh(vestGeo, materials.vestRed);
            vestMesh.position.y = 2.5;
            vestMesh.visible = false; // Começa sem colete
            vestMesh.castShadow = true;
            rabbitGroup.add(vestMesh);

            // Cartola (Chapeleiro)
            hatGroup = new THREE.Group();
            const brimGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.1, 32);
            const brim = new THREE.Mesh(brimGeo, materials.hatFabric);
            brim.position.y = 6.2;
            hatGroup.add(brim);

            const crownGeo = new THREE.CylinderGeometry(1.4, 1.2, 2.5, 32);
            const crown = new THREE.Mesh(crownGeo, materials.hatFabric);
            crown.position.y = 7.5;
            hatGroup.add(crown);

            const ribbonGeo = new THREE.CylinderGeometry(1.42, 1.35, 0.4, 32);
            const ribbon = new THREE.Mesh(ribbonGeo, materials.ribbon);
            ribbon.position.y = 6.5;
            hatGroup.add(ribbon);

            // Etiqueta do chapéu "10/6"
            const tagGeo = new THREE.PlaneGeometry(0.6, 0.4);
            const tagMat = new THREE.MeshStandardMaterial({ color: 0xddddaa });
            const tag = new THREE.Mesh(tagGeo, tagMat);
            tag.position.set(1.2, 6.7, 0.8);
            tag.rotation.y = Math.PI / 4;
            tag.rotation.z = -0.2;
            hatGroup.add(tag);

            hatGroup.rotation.z = 0.1;
            hatGroup.position.x = 0.2;
            hatGroup.visible = false;
            rabbitGroup.add(hatGroup);

            // Óculos
            glassesGroup = new THREE.Group();
            const frameGeo = new THREE.TorusGeometry(0.35, 0.05, 16, 32);
           
            const frameR = new THREE.Mesh(frameGeo, materials.gold);
            frameR.position.set(0.5, 5.4, 1.3);
            glassesGroup.add(frameR);

            const frameL = new THREE.Mesh(frameGeo, materials.gold);
            frameL.position.set(-0.5, 5.4, 1.3);
            glassesGroup.add(frameL);

            const bridgeGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4);
            const bridge = new THREE.Mesh(bridgeGeo, materials.gold);
            bridge.position.set(0, 5.4, 1.3);
            bridge.rotation.z = Math.PI / 2;
            glassesGroup.add(bridge);

            // Lentes de vidro
            const lensGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.02, 32);
            const lensR = new THREE.Mesh(lensGeo, materials.glass);
            lensR.position.set(0.5, 5.4, 1.3);
            lensR.rotation.x = Math.PI / 2;
            glassesGroup.add(lensR);

            const lensL = new THREE.Mesh(lensGeo, materials.glass);
            lensL.position.set(-0.5, 5.4, 1.3);
            lensL.rotation.x = Math.PI / 2;
            glassesGroup.add(lensL);

            glassesGroup.visible = false;
            rabbitGroup.add(glassesGroup);

            // Relógio de Bolso
            watchGroup = new THREE.Group();
            const watchBodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.15, 32);
            const watchBody = new THREE.Mesh(watchBodyGeo, materials.gold);
            watchBody.rotation.x = Math.PI / 2;
            watchGroup.add(watchBody);

            const watchFaceGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.16, 32);
            const watchFace = new THREE.Mesh(watchFaceGeo, new THREE.MeshStandardMaterial({color: 0xffffff}));
            watchFace.rotation.x = Math.PI / 2;
            watchGroup.add(watchFace);

            const buttonGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.2);
            const watchBtn = new THREE.Mesh(buttonGeo, materials.gold);
            watchBtn.position.y = 0.5;
            watchGroup.add(watchBtn);

            // Corrente do relógio (Simples)
            const chainGeo = new THREE.TorusGeometry(0.1, 0.02, 8, 16);
            for(let i=0; i<5; i++) {
                const link = new THREE.Mesh(chainGeo, materials.gold);
                link.position.y = 0.6 + i * 0.15;
                link.rotation.y = i % 2 === 0 ? 0 : Math.PI/2;
                watchGroup.add(link);
            }

            watchGroup.position.set(2.0, 2.5, 0.5); // Posicionado perto da mão direita
            watchGroup.rotation.z = -0.3;
            watchGroup.visible = false;
            rabbitGroup.add(watchGroup);


            scene.add(rabbitGroup);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Animação de respiração do coelho
            breathingTime += 0.03;
            if (rabbitGroup) {
                // Expansão sutil do peito/escala Y
                const scale = 1 + Math.sin(breathingTime) * 0.015;
                rabbitGroup.scale.set(1, scale, 1);
            }

            // Animar as cartas flutuantes no fundo
            scene.children.forEach(child => {
                if(child.userData && child.userData.rotSpeed) {
                    child.rotation.y += child.userData.rotSpeed;
                    child.rotation.x += child.userData.rotSpeed * 0.5;
                    child.position.y = child.userData.startY + Math.sin(breathingTime * 0.5 + child.userData.startY) * 1.5;
                }
            });

            // Animar o relógio se estiver visível (balanço suave)
            if (watchGroup && watchGroup.visible) {
                watchGroup.rotation.z = -0.3 + Math.sin(breathingTime * 2) * 0.1;
                watchGroup.rotation.x = Math.sin(breathingTime) * 0.05;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- LÓGICA DA INTERFACE DE UTILIZADOR (UI) ---

        function changeVest(color) {
            // Atualizar UI
            document.getElementById('btn-vest-none').classList.remove('active');
            document.getElementById('btn-vest-red').classList.remove('active');
            document.getElementById('btn-vest-blue').classList.remove('active');
            document.getElementById('btn-vest-green').classList.remove('active');
            document.getElementById(`btn-vest-${color}`).classList.add('active');

            // Atualizar Modelo 3D
            if (color === 'none') {
                vestMesh.visible = false;
            } else {
                vestMesh.visible = true;
                if (color === 'red') vestMesh.material = materials.vestRed;
                if (color === 'blue') vestMesh.material = materials.vestBlue;
                if (color === 'green') vestMesh.material = materials.vestGreen;
            }
        }

        function toggleHat() {
            const btn = document.getElementById('btn-hat');
            if (hatGroup.visible) {
                hatGroup.visible = false;
                btn.classList.remove('active');
            } else {
                hatGroup.visible = true;
                btn.classList.add('active');
            }
        }

        function toggleGlasses() {
            const btn = document.getElementById('btn-glasses');
            if (glassesGroup.visible) {
                glassesGroup.visible = false;
                btn.classList.remove('active');
            } else {
                glassesGroup.visible = true;
                btn.classList.add('active');
            }
        }

        function toggleWatch() {
            const btn = document.getElementById('btn-watch');
            if (watchGroup.visible) {
                watchGroup.visible = false;
                btn.classList.remove('active');
            } else {
                watchGroup.visible = true;
                btn.classList.add('active');
            }
        }

    </script>
</body>
</html>
