<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Fuga do Elefante Bébé</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #6a0dad; /* Roxo escuro */
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid white;
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            background-color: #9370DB; /* Roxo médio para a pista */
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
            pointer-events: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(106, 13, 173, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 20;
        }

        h1 { margin: 0 0 10px 0; font-size: 28px; color: #FF69B4; text-shadow: 2px 2px white; }
        p { margin: 5px 0; font-size: 16px; }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            background: #FF69B4; /* Rosa Choque */
            color: white;
            border: 4px solid white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
       
        <div id="ui-layer">
            Pontos: <span id="scoreVal">0</span> 🌟
        </div>

        <div id="overlay">
            <h1>A Fuga do Elefante!</h1>
            <div style="font-size: 50px; margin: 10px;">🐘🚗💨 🦊</div>
            <p>Conduz o carro rosa.</p>
            <p>Apanha as estrelas azuis (🔵).</p>
            <p>Foge dos Pandas Vermelhos (🦊)!</p>
            <button onclick="startGame()">JOGAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const overlay = document.getElementById('overlay');

        // Estado do Jogo
        let gameActive = false;
        let score = 0;
        let speed = 4;
        let frame = 0;

        // Fundo (Lacinhos)
        let bows = [];
       
        // Entidades
        let player = { x: 175, y: 500, w: 50, h: 70 };
        let items = []; // Estrelas e Pandas

        // Input
        let input = { left: false, right: false };

        // Inicializar Inputs
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') input.left = true;
            if(e.key === 'ArrowRight') input.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft') input.left = false;
            if(e.key === 'ArrowRight') input.right = false;
        });
       
        // Touch para telemóvel
        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);

        function handleTouch(e) {
            e.preventDefault();
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
           
            // Move o jogador diretamente para onde o dedo está
            player.x = touchX - player.w / 2;
        }

        function initBackground() {
            bows = [];
            for(let i=0; i<15; i++) {
                bows.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 2 + 1
                });
            }
        }

        function startGame() {
            gameActive = true;
            score = 0;
            speed = 4;
            scoreEl.innerText = score;
            overlay.classList.add('hidden');
            items = [];
            player.x = canvas.width/2 - 25;
            initBackground();
            gameLoop();
        }

        function gameOver() {
            gameActive = false;
            overlay.innerHTML = `
                <h1>Oh não!</h1>
                <p>O Panda apanhou-te!</p>
                <p>Pontuação Final: ${score}</p>
                <button onclick="startGame()">Tentar de Novo</button>
            `;
            overlay.classList.remove('hidden');
        }

        function spawnItem() {
            // Aumenta a dificuldade com o tempo
            const spawnRate = Math.max(20, 60 - Math.floor(score/5));
           
            if (frame % spawnRate === 0) {
                const isBad = Math.random() > 0.6; // 40% chance de ser um Panda
                items.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -50,
                    w: 40,
                    h: 40,
                    type: isBad ? 'panda' : 'star',
                    speed: isBad ? speed + 1 : speed // Pandas são mais rápidos?
                });
            }
        }

        function drawBackground() {
            // Fundo roxo limpo
            ctx.fillStyle = "#8A2BE2";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Lacinhos Brancos a cair
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.font = "24px Arial";
           
            bows.forEach(b => {
                b.y += b.speed + (speed * 0.5); // Movem-se com a velocidade do carro
                if(b.y > canvas.height) {
                    b.y = -30;
                    b.x = Math.random() * canvas.width;
                }
                ctx.fillText("🎀", b.x, b.y);
            });
        }

        function drawPlayer() {
            // Sombra do carro
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.ellipse(player.x + 25, player.y + 65, 20, 8, 0, 0, Math.PI*2);
            ctx.fill();

            // Carro Rosa
            ctx.fillStyle = "#FF69B4"; // HotPink
            // Corpo principal
            ctx.beginPath();
            ctx.roundRect(player.x, player.y + 30, 50, 30, 10);
            ctx.fill();
            // Capot
            ctx.fillStyle = "#FF1493"; // Rosa mais escuro
            ctx.fillRect(player.x + 5, player.y + 40, 40, 15);

            // Elefante
            ctx.font = "40px Arial";
            ctx.fillText("🐘", player.x + 5, player.y + 35);

            // Rodas
            ctx.fillStyle = "#333";
            ctx.fillRect(player.x - 5, player.y + 45, 10, 15);
            ctx.fillRect(player.x + 45, player.y + 45, 10, 15);
        }

        function drawStar(x, y) {
            ctx.save();
            ctx.translate(x + 20, y + 20);
            ctx.beginPath();
            ctx.fillStyle = "#00BFFF"; // Azul vibrante
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            // Forma de estrela
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * 20,
                           -Math.sin((18 + i * 72) * Math.PI / 180) * 20);
                ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * 8,
                           -Math.sin((54 + i * 72) * Math.PI / 180) * 8);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function updateAndDrawItems() {
            for(let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += speed;

                // Desenhar
                if(item.type === 'star') {
                    drawStar(item.x, item.y);
                } else {
                    ctx.font = "40px Arial";
                    ctx.fillText("🦊", item.x, item.y + 35); // Panda Vermelho
                }

                // Colisão simples (Caixa)
                if (
                    player.x < item.x + item.w &&
                    player.x + player.w > item.x &&
                    player.y < item.y + item.h &&
                    player.y + player.h > item.y
                ) {
                    if(item.type === 'star') {
                        score += 10;
                        scoreEl.innerText = score;
                        items.splice(i, 1);
                        // Acelera o jogo ligeiramente a cada 50 pontos
                        if(score % 50 === 0) speed += 1;
                    } else {
                        // Bateu no Panda
                        gameOver();
                    }
                }
                // Remover se sair do ecrã
                else if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }
        }

        function gameLoop() {
            if(!gameActive) return;

            // Limpar Ecrã
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Atualizar e Desenhar Fundo
            drawBackground();

            // 2. Mover Jogador
            if(input.left && player.x > 0) player.x -= 6;
            if(input.right && player.x < canvas.width - player.w) player.x += 6;

            // 3. Gerar e Mover Itens
            spawnItem();
            updateAndDrawItems();

            // 4. Desenhar Jogador
            drawPlayer();

            frame++;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
