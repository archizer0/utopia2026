<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice: Queda pela Toca do Coelho</title>
    <style>
        :root {
            --alice-blue: #a5d6f1;
            --wonderland-purple: #9b59b6;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Georgia', serif;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: var(--alice-blue);
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #4a148c, #000);
            border: 5px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(155, 89, 182, 0.5);
        }

        /* Alice */
        #alice {
            position: absolute;
            bottom: 50px;
            left: 180px;
            width: 40px;
            height: 60px;
            background-color: var(--alice-blue);
            border-radius: 20px 20px 5px 5px;
            z-index: 10;
            display: flex;
            justify-content: center;
            transition: left 0.1s ease-out;
            box-shadow: 0 0 15px rgba(165, 214, 241, 0.8);
        }

        #alice::before {
            content: '👧';
            font-size: 30px;
            position: absolute;
            top: -25px;
        }

        #alice::after {
            content: '';
            position: absolute;
            bottom: 10px;
            width: 45px;
            height: 30px;
            background: white; /* Avental */
            border-radius: 5px;
            opacity: 0.8;
        }

        .obstacle {
            position: absolute;
            top: -50px;
            font-size: 35px;
            z-index: 5;
            filter: drop-shadow(0 0 5px white);
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 20px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: var(--wonderland-purple);
            color: white;
            border: none;
            border-radius: 30px;
            margin-top: 20px;
            font-family: inherit;
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #ddd;
        }
    </style>
</head>
<body>

    <h1>ALICE NO PAÍS DAS MARAVILHAS</h1>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score">Curiosidade: 0</div>
        </div>

        <div id="alice"></div>

        <div id="overlay">
            <h2 id="status-text">Caindo na Toca do Coelho...</h2>
            <p>Usa as <b>setas</b> ou <b>clica nas laterais</b> para mover a Alice.</p>
            <button onclick="startGame()">Começar Aventura</button>
        </div>
    </div>

    <p class="instructions">Desvia-te dos objetos para não acordares do sonho!</p>

    <script>
        const alice = document.getElementById('alice');
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');

        let aliceX = 180;
        let score = 0;
        let isGameOver = true;
        let obstacles = [];
        let gameSpeed = 5;
        let spawnRate = 1000;
        let lastSpawn = 0;
       
        const items = ['☕', '🎩', '🐇', '🃏', '🕒', '🍄', '🌹'];

        // Movimento
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            if (e.key === 'ArrowLeft' && aliceX > 10) aliceX -= 25;
            if (e.key === 'ArrowRight' && aliceX < 350) aliceX += 25;
            updateAlicePos();
        });

        // Touch/Click nas laterais
        container.addEventListener('click', (e) => {
            if (isGameOver) return;
            const rect = container.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            if (clickX < 200 && aliceX > 10) aliceX -= 30;
            else if (clickX >= 200 && aliceX < 350) aliceX += 30;
            updateAlicePos();
        });

        function updateAlicePos() {
            alice.style.left = aliceX + 'px';
        }

        function spawnObstacle() {
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            obs.innerText = items[Math.floor(Math.random() * items.length)];
            const startX = Math.random() * 350;
            obs.style.left = startX + 'px';
            obs.style.top = '-50px';
           
            container.appendChild(obs);
            obstacles.push({
                element: obs,
                y: -50,
                x: startX
            });
        }

        function gameLoop(time) {
            if (isGameOver) return;

            // Criar novos itens
            if (time - lastSpawn > spawnRate) {
                spawnObstacle();
                lastSpawn = time;
                if (spawnRate > 400) spawnRate -= 5;
                gameSpeed += 0.02;
            }

            // Mover itens
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += gameSpeed;
                obs.element.style.top = obs.y + 'px';

                // Colisão
                const aRect = alice.getBoundingClientRect();
                const oRect = obs.element.getBoundingClientRect();

                if (
                    aRect.left < oRect.right - 5 &&
                    aRect.right > oRect.left + 5 &&
                    aRect.top < oRect.bottom - 5 &&
                    aRect.bottom > oRect.top + 5
                ) {
                    endGame();
                }

                // Remover se passar do fundo
                if (obs.y > 600) {
                    obs.element.remove();
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = "Curiosidade: " + score;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            isGameOver = false;
            score = 0;
            gameSpeed = 5;
            spawnRate = 1000;
            aliceX = 180;
            updateAlicePos();
            scoreDisplay.innerText = "Curiosidade: 0";
            overlay.style.display = 'none';
           
            // Limpar obstáculos antigos
            obstacles.forEach(o => o.element.remove());
            obstacles = [];
           
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            statusText.innerText = "Curioso demais! Acordaste do sonho.";
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
