<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Festa do Chá da Alice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Quicksand', sans-serif;
            touch-action: none; /* Previne zoom no telemóvel */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 8px solid #fff;
        }

        /* Estilos da Interface (UI) */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 24px;
            color: #4a4a4a;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #e91e63;
        }

        .screen {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 4px solid #e91e63;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            pointer-events: auto;
            max-width: 90%;
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: #e91e63;
            font-size: 3em;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(45deg, #e91e63, #ff4081);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 1.5em;
            font-family: 'Cinzel Decorative', cursive;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(233, 30, 99, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        /* Instruções de controlo */
        .controls-hint {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD: Pontuação -->
        <div id="hud" class="hud hidden">
            Pontuação: <span id="scoreVal">0</span>
        </div>

        <!-- Ecrã Inicial -->
        <div id="startScreen" class="ui-layer">
            <div class="screen">
                <h1>Alice no País das Maravilhas</h1>
                <p>Ajuda a Alice a apanhar o chá e os bolos para a festa!<br>Cuidado com os soldados de cartas da Rainha.</p>
                <button onclick="startGame()">Começar Aventura</button>
                <div class="controls-hint">
                    Usa as setas ⬅️ ➡️ ou toca nas laterais do ecrã para mover.
                </div>
            </div>
        </div>

        <!-- Ecrã de Fim de Jogo -->
        <div id="gameOverScreen" class="ui-layer hidden">
            <div class="screen">
                <h1 style="color: #4a4a4a;">Fim de Jogo!</h1>
                <p>A Rainha de Copas apanhou-te!</p>
                <p>Pontuação Final: <strong id="finalScore" style="color: #e91e63; font-size: 1.5em;">0</strong></p>
                <button onclick="startGame()">Tentar Novamente</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuração do Canvas ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
       
        // Ajuste de tamanho responsivo
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Estado do Jogo ---
        let gameActive = false;
        let score = 0;
        let frameCount = 0;
        let difficultyMultiplier = 1;
        let particles = [];

        // --- Recursos (Emojis como Sprites) ---
        const sprites = {
            player: '👧🏼', // Alice
            good: ['☕', '🍰', '🫖', '🧁'], // Chá, Bolo, Bule, Cupcake
            bad: ['🃏', '♠️', '♥️', '♣️', '♦️'], // Cartas e Naipes
        };

        // --- Objetos do Jogo ---
       
        const player = {
            x: 0,
            y: 0,
            width: 60,
            height: 80,
            speed: 10,
            targetX: 0, // Para movimento suave
           
            draw() {
                // Sombra
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height - 5, 20, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Sprite da Alice
                ctx.font = '60px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(sprites.player, this.x + this.width/2, this.y + this.height);
            },
           
            update() {
                // Interpolação simples para movimento mais fluido
                this.x += (this.targetX - this.x) * 0.2;
               
                // Limites do ecrã
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;
            }
        };

        let items = [];

        class Item {
            constructor() {
                this.size = 40;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -50;
                this.speed = (Math.random() * 3 + 2) * difficultyMultiplier;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
               
                // 75% probabilidade de ser bom, 25% de ser mau
                this.isBad = Math.random() < 0.25;
               
                if (this.isBad) {
                    this.sprite = sprites.bad[Math.floor(Math.random() * sprites.bad.length)];
                } else {
                    this.sprite = sprites.good[Math.floor(Math.random() * sprites.good.length)];
                }
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rotation);
                ctx.font = '35px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.sprite, 0, 0);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 4 - 2;
                this.color = color;
                this.life = 1; // Opacidade
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // --- Controlos ---
        let keys = {};
       
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Controlos de Toque (Telemóvel)
        let touchX = null;
        canvas.addEventListener('touchstart', (e) => {
            touchX = e.touches[0].clientX;
        }, {passive: false});
       
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Previne o scroll
            const currentTouchX = e.touches[0].clientX;
            const diff = currentTouchX - touchX;
            player.targetX += diff * 1.5; // Sensibilidade
            touchX = currentTouchX;
        }, {passive: false});

        // --- Lógica Principal ---

        function spawnParticles(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollisions() {
            items.forEach((item, index) => {
                // Colisão simples (Caixa Delimitadora)
                if (
                    player.x < item.x + item.size &&
                    player.x + player.width > item.x &&
                    player.y < item.y + item.size &&
                    player.y + player.height > item.y
                ) {
                    // Colidiu
                    items.splice(index, 1);
                   
                    if (item.isBad) {
                        endGame();
                    } else {
                        score += 10;
                        document.getElementById('scoreVal').innerText = score;
                        spawnParticles(item.x, item.y, '#FFD700'); // Partículas douradas
                       
                        // Aumentar dificuldade a cada 100 pontos
                        if (score % 100 === 0) {
                            difficultyMultiplier += 0.2;
                        }
                    }
                }
            });
        }

        function update() {
            if (!gameActive) return;

            // Movimento no Computador
            if (keys['ArrowLeft']) player.targetX -= player.speed;
            if (keys['ArrowRight']) player.targetX += player.speed;

            // Limitar targetX para não sair do ecrã infinitamente
            if (player.targetX < 0) player.targetX = 0;
            if (player.targetX > canvas.width - player.width) player.targetX = canvas.width - player.width;

            player.update();

            // Gerar itens
            frameCount++;
            if (frameCount % Math.max(20, 60 - Math.floor(score/20)) === 0) {
                items.push(new Item());
            }

            // Atualizar itens
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].update();
                // Remover se sair do ecrã por baixo
                if (items[i].y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            // Atualizar partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            checkCollisions();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Entidades
            player.draw();
            items.forEach(item => item.draw());
            particles.forEach(p => p.draw());

            if (gameActive) {
                requestAnimationFrame(() => {
                    update();
                    draw();
                });
            }
        }

        // --- Controlo de Fluxo ---

        function startGame() {
            // Repor variáveis
            gameActive = true;
            score = 0;
            items = [];
            particles = [];
            difficultyMultiplier = 1;
            frameCount = 0;
            document.getElementById('scoreVal').innerText = '0';
           
            // Repor posição do jogador
            player.x = canvas.width / 2 - player.width / 2;
            player.targetX = player.x;
            player.y = canvas.height - 100;

            // Interface
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');

            draw(); // Iniciar ciclo de animação
        }

        function endGame() {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
        }

        // Inicialização
        resizeCanvas();

    </script>
</body>
</html>
