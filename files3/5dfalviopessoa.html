<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corrida no País das Maravilhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a0b2e; /* Fundo escuro mágico */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Previne scroll no mobile */
        }
        canvas {
            display: block;
        }
        /* Animação suave para os botões */
        .btn-magic {
            transition: all 0.2s;
            box-shadow: 0 4px 0 #9d174d;
        }
        .btn-magic:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #9d174d;
        }
        .title-glow {
            text-shadow: 0 0 10px #fbcfe8, 0 0 20px #f472b6;
        }
    </style>
</head>
<body class="text-white select-none">

    <!-- HUD (Pontuação) -->
    <div id="hud" class="absolute top-4 left-4 z-10 hidden text-2xl md:text-3xl font-bold drop-shadow-md">
        Pontos: <span id="scoreDisplay" class="text-pink-300">0</span>
    </div>

    <!-- Tela Inicial -->
    <div id="startScreen" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="text-6xl md:text-8xl mb-4">🍄☕🎩</div>
        <h1 class="text-4xl md:text-6xl font-black text-pink-400 mb-2 title-glow text-center px-4">
            Modo Insano!
        </h1>
        <p class="text-xl md:text-2xl text-purple-200 mb-8 text-center px-4">
            Velocidade extrema! Sobreviva se puder!<br>
            <span class="text-sm text-gray-400">PC: Setas ⬅️ ➡️ | Celular: Toque nas laterais</span>
        </p>
        <button id="startBtn" class="btn-magic bg-pink-500 hover:bg-pink-400 text-white font-bold py-4 px-10 rounded-full text-2xl">
            Iniciar Corrida
        </button>
    </div>

    <!-- Tela de Fim de Jogo -->
    <div id="gameOverScreen" class="absolute inset-0 z-20 hidden flex-col items-center justify-center bg-black/90 backdrop-blur-md">
        <div class="text-6xl mb-4">⏱️</div>
        <h2 class="text-5xl md:text-7xl font-bold text-red-500 mb-4 title-glow">Fim do Tempo!</h2>
        <p class="text-2xl md:text-3xl text-white mb-8">
            Sua Pontuação: <span id="finalScore" class="text-pink-400 font-bold">0</span>
        </p>
        <button id="restartBtn" class="btn-magic bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-10 rounded-full text-2xl">
            Tentar Novamente
        </button>
    </div>

    <!-- O Canvas do Jogo -->
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
       
        // Elementos de UI
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Variáveis globais do jogo
        let animationId;
        let isPlaying = false;
        let score = 0;
        let gameSpeed = 12; // Velocidade inicial muito mais alta
        let roadOffset = 0; // Para o efeito de movimento do chão xadrez

        // Configurações da Pista
        let roadWidth;
        let roadLeft;
        let roadRight;

        // Entidades
        let player;
        let obstacles = [];
        let particles = [];

        // Emojis usados no jogo
        const EMOJI_PLAYER = "☕"; // Xícara de chá
        const EMOJI_OBSTACLES = ["🃏", "⏱️", "🎩", "🐛"]; // Cartas, Relógio, Chapéu, Lagarta
        const EMOJI_DECOR = ["🍄", "🌹"]; // Cogumelos e rosas para a borda

        // Controles
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false,
            d: false
        };

        // Redimensionar canvas para tela inteira
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
           
            // Define a largura da pista (máximo de 500px ou largura da tela - bordas)
            roadWidth = Math.min(500, canvas.width * 0.8);
            roadLeft = (canvas.width - roadWidth) / 2;
            roadRight = roadLeft + roadWidth;

            // Reposiciona jogador se ele sair da tela após redimensionar
            if (player) {
                player.y = canvas.height - 120;
                if (player.x < roadLeft + player.radius) player.x = roadLeft + player.radius;
                if (player.x > roadRight - player.radius) player.x = roadRight - player.radius;
            }
        }

        window.addEventListener('resize', resizeCanvas);

        // Classe do Jogador
        class Player {
            constructor() {
                this.radius = 25; // Tamanho de colisão
                this.x = canvas.width / 2;
                this.y = canvas.height - 120;
                this.speed = 15; // Movimento lateral muito mais rápido para compensar a dificuldade
                this.emojiSize = 50;
                this.tilt = 0; // Para animação de curva
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.tilt);
                ctx.font = `${this.emojiSize}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(EMOJI_PLAYER, 0, 0);
               
                // Desenhar hitbox (Apenas para debug, comentado na versão final)
                // ctx.beginPath();
                // ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                // ctx.strokeStyle = "red";
                // ctx.stroke();
               
                ctx.restore();
            }

            update() {
                // Movimento do Teclado
                let moving = false;
                if ((keys.ArrowLeft || keys.a) && this.x - this.radius > roadLeft) {
                    this.x -= this.speed;
                    this.tilt = -0.2; // Inclina para esquerda
                    moving = true;
                }
                if ((keys.ArrowRight || keys.d) && this.x + this.radius < roadRight) {
                    this.x += this.speed;
                    this.tilt = 0.2; // Inclina para direita
                    moving = true;
                }

                if (!moving) {
                    this.tilt = 0; // Volta ao normal
                }
               
                this.draw();
            }
        }

        // Classe dos Obstáculos
        class Obstacle {
            constructor() {
                this.radius = 20;
                // Posição X aleatória dentro da pista
                this.x = roadLeft + this.radius + Math.random() * (roadWidth - this.radius * 2);
                this.y = -50; // Começa fora da tela por cima
                // Seleciona um emoji aleatório
                this.emoji = EMOJI_OBSTACLES[Math.floor(Math.random() * EMOJI_OBSTACLES.length)];
                this.size = 45 + Math.random() * 15; // Tamanhos variados
                this.rotation = Math.random() * Math.PI * 2; // Rotação inicial
                this.rotSpeed = (Math.random() - 0.5) * 0.1; // Velocidade de giro
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }

            update() {
                this.y += gameSpeed; // Move para baixo baseado na velocidade do jogo
                this.rotation += this.rotSpeed; // Faz girar
                this.draw();
            }
        }

        // Eventos de Teclado
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Eventos de Toque (Mobile)
        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});
        canvas.addEventListener('touchend', () => {
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
        });

        function handleTouch(e) {
            e.preventDefault(); // Evita scroll ao tocar
            if (!isPlaying) return;
           
            const touchX = e.touches[0].clientX;
            const halfScreen = window.innerWidth / 2;
           
            if (touchX < halfScreen) {
                keys.ArrowLeft = true;
                keys.ArrowRight = false;
            } else {
                keys.ArrowRight = true;
                keys.ArrowLeft = false;
            }
        }

        // Função de Desenhar o Cenário (Chão Xadrez e Bordas)
        function drawEnvironment() {
            // Fundo da pista (escuro)
            ctx.fillStyle = "#2c1044";
            ctx.fillRect(roadLeft, 0, roadWidth, canvas.height);

            // Chão Xadrez (Quadriculado em perspectiva ilusória descendo)
            const tileSize = 60;
            roadOffset += gameSpeed;
            if (roadOffset > tileSize * 2) roadOffset -= tileSize * 2;

            for (let y = -tileSize * 2; y < canvas.height; y += tileSize) {
                for (let x = roadLeft; x < roadRight; x += tileSize) {
                    // Alterna as cores para criar o xadrez
                    let isDark = (Math.floor((x - roadLeft) / tileSize) + Math.floor((y + roadOffset) / tileSize)) % 2 === 0;
                    ctx.fillStyle = isDark ? "#4b0082" : "#8a2be2"; // Índigo e Azul Violeta
                   
                    // Ajusta a largura da última peça se passar da borda da pista
                    let currentTileWidth = tileSize;
                    if (x + tileSize > roadRight) {
                        currentTileWidth = roadRight - x;
                    }
                   
                    ctx.fillRect(x, y + (roadOffset % tileSize), currentTileWidth, tileSize);
                }
            }

            // Bordas da Pista (Grama mágica)
            ctx.fillStyle = "#11051f";
            ctx.fillRect(0, 0, roadLeft, canvas.height); // Esquerda
            ctx.fillRect(roadRight, 0, canvas.width - roadRight, canvas.height); // Direita

            // Linhas iluminadas nas bordas da pista
            ctx.strokeStyle = "#ff69b4"; // Rosa brilhante
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(roadLeft, 0);
            ctx.lineTo(roadLeft, canvas.height);
            ctx.moveTo(roadRight, 0);
            ctx.lineTo(roadRight, canvas.height);
            ctx.stroke();

            // Desenhar decorações nas bordas (Cogumelos descendo)
            // Aqui usamos um truque matemático simples baseado no roadOffset para posicionar os itens
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
           
            let decorSpacing = 200;
            let decorOffset = roadOffset % decorSpacing;
           
            for (let y = -decorSpacing; y < canvas.height + decorSpacing; y += decorSpacing) {
                let actualY = y + decorOffset;
               
                // Lado Esquerdo
                ctx.fillText(EMOJI_DECOR[0], roadLeft - 30, actualY);
                // Lado Direito
                ctx.fillText(EMOJI_DECOR[1], roadRight + 30, actualY + 50); // Desalinhado
            }
        }

        // Função de detecção de colisão (Círculo com Círculo)
        function checkCollision(circle1, circle2) {
            const dx = circle1.x - circle2.x;
            const dy = circle1.y - circle2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (circle1.radius + circle2.radius) * 0.9; // Colisão mais rigorosa (0.9 em vez de 0.8)
        }

        // Inicialização do Jogo
        function initGame() {
            resizeCanvas();
            player = new Player();
            obstacles = [];
            score = 0;
            gameSpeed = 12; // Reseta para a velocidade inicial alta
            scoreDisplay.innerText = score;
           
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
           
            isPlaying = true;
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
           
            animate();
        }

        // Fim de Jogo
        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.classList.add('flex');
            finalScore.innerText = Math.floor(score);
        }

        // Loop Principal do Jogo
        let frameCount = 0;
        function animate() {
            if (!isPlaying) return;
            animationId = requestAnimationFrame(animate);
            frameCount++;

            // Limpa o canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha cenário
            drawEnvironment();

            // Atualiza e desenha o jogador
            player.update();

            // Sistema de Dificuldade: Aumenta a velocidade com o tempo
            if (frameCount % 300 === 0 && gameSpeed < 35) { // Aumenta mais rápido (a cada ~5s) e limite muito maior
                gameSpeed += 2;
            }

            // Aumenta a pontuação
            score += gameSpeed * 0.05; // Pontua mais rápido devido à dificuldade
            scoreDisplay.innerText = Math.floor(score);

            // Geração de Obstáculos (Muito mais rápido e denso)
            let spawnRate = Math.max(12, 40 - gameSpeed);
            if (frameCount % Math.floor(spawnRate) === 0) {
                obstacles.push(new Obstacle());
               
                // 40% de chance de nascer um segundo obstáculo simultâneo para criar paredes quase fechadas
                if (Math.random() < 0.4) {
                    let secondObs = new Obstacle();
                    // Garante que não nasçam exatamente no mesmo lugar
                    if (Math.abs(secondObs.x - obstacles[obstacles.length-1].x) < 60) {
                        secondObs.x = roadLeft + 30 + Math.random() * (roadWidth - 60);
                    }
                    obstacles.push(secondObs);
                }
            }

            // Atualizar obstáculos e verificar colisões
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.update();

                // Verifica colisão
                if (checkCollision(player, obs)) {
                    gameOver();
                }

                // Remove obstáculos que saíram da tela
                if (obs.y > canvas.height + 100) {
                    obstacles.splice(i, 1);
                }
            }
        }

        // Eventos dos Botões
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

        // Renderização inicial do fundo antes de jogar
        resizeCanvas();
        drawEnvironment();
       
    </script>
</body>
</html>
