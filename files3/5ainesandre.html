<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice no País das Maravilhas - Jogo da Memória</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Nunito:wght@400;700&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #9d174d 100%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;
        }

        h1, .cinzel {
            font-family: 'Cinzel', serif;
        }

        /* Lógica 3D para virar as cartas */
        .perspective {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.8;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .card-back {
            /* Frente visual (quando virada para baixo) */
            background: repeating-linear-gradient(
                45deg,
                #3b0764,
                #3b0764 10px,
                #581c87 10px,
                #581c87 20px
            );
            color: #d8b4fe;
            font-size: 2rem;
        }

        .card-front {
            /* Costas visuais (quando virada para cima, revela a personagem) */
            background: linear-gradient(135deg, #fdf4ff 0%, #f3e8ff 100%);
            transform: rotateY(180deg);
            font-size: 3rem;
        }

        /* Efeito flutuante para o título */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Esconder barra de rolagem mas permitir scroll */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 sm:p-8 relative">

    <!-- Decorações de fundo -->
    <div class="fixed top-10 left-10 text-4xl opacity-20 transform -rotate-12 select-none pointer-events-none">⏱️</div>
    <div class="fixed bottom-20 right-10 text-5xl opacity-20 transform rotate-12 select-none pointer-events-none">☕</div>
    <div class="fixed top-40 right-20 text-4xl opacity-20 transform rotate-45 select-none pointer-events-none">♠️</div>
    <div class="fixed bottom-40 left-20 text-4xl opacity-20 transform -rotate-45 select-none pointer-events-none">♥️</div>

    <div class="max-w-3xl mx-auto w-full flex-grow flex flex-col items-center justify-center relative z-10">
       
        <div class="text-center mb-6 animate-float">
            <h1 class="text-3xl sm:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-300 to-purple-300 drop-shadow-lg mb-2">
                O País das Maravilhas
            </h1>
            <p class="text-purple-200 text-sm sm:text-base cinzel tracking-widest">Jogo da Memória</p>
        </div>

        <!-- Painel de Estatísticas -->
        <div class="flex gap-6 sm:gap-12 mb-8 bg-black/30 px-6 py-3 rounded-full backdrop-blur-sm border border-white/10 shadow-xl">
            <div class="flex flex-col items-center">
                <span class="text-xs text-purple-300 uppercase tracking-wider font-bold">Tempo</span>
                <span id="timer" class="text-xl sm:text-2xl font-bold font-mono">00:00</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-xs text-pink-300 uppercase tracking-wider font-bold">Movimentos</span>
                <span id="moves" class="text-xl sm:text-2xl font-bold font-mono">0</span>
            </div>
        </div>

        <!-- Tabuleiro do Jogo -->
        <div id="game-board" class="grid grid-cols-4 gap-3 sm:gap-4 w-full max-w-lg mb-8 perspective">
            <!-- As cartas serão geradas aqui pelo JavaScript -->
        </div>

        <button onclick="initGame()" class="group relative px-8 py-3 bg-gradient-to-r from-pink-600 to-purple-600 rounded-full font-bold text-lg hover:from-pink-500 hover:to-purple-500 transition-all shadow-[0_0_20px_rgba(219,39,119,0.4)] hover:shadow-[0_0_30px_rgba(219,39,119,0.6)] hover:-translate-y-1">
            <span class="cinzel tracking-wider">Reiniciar Magia</span>
        </button>
    </div>

    <!-- Modal de Vitória (Escondido por padrão) -->
    <div id="victory-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="bg-gradient-to-br from-purple-900 to-indigo-900 p-8 sm:p-12 rounded-3xl border-2 border-pink-500/50 shadow-[0_0_50px_rgba(236,72,153,0.3)] text-center max-w-md mx-4 transform scale-95 transition-transform duration-500" id="modal-content">
            <div class="text-6xl mb-6">🐇🕳️</div>
            <h2 class="text-3xl sm:text-4xl font-bold cinzel text-pink-300 mb-4">Curioso e Curiosíssimo!</h2>
            <p class="text-purple-100 mb-6 text-lg">Conseguiste encontrar todos os pares a tempo de não perderes a cabeça!</p>
           
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-black/40 p-4 rounded-xl">
                    <div class="text-sm text-purple-300 mb-1">Tempo Final</div>
                    <div id="final-time" class="text-2xl font-bold text-white font-mono">00:00</div>
                </div>
                <div class="bg-black/40 p-4 rounded-xl">
                    <div class="text-sm text-pink-300 mb-1">Movimentos</div>
                    <div id="final-moves" class="text-2xl font-bold text-white font-mono">0</div>
                </div>
            </div>

            <button onclick="closeModalAndRestart()" class="w-full py-4 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold text-lg cinzel tracking-widest transition-colors shadow-lg">
                Descer na Toca Novamente
            </button>
        </div>
    </div>

    <script>
        // Personagens/Símbolos do jogo
        const characters = [
            '👱‍♀️', // Alice
            '🐇', // Coelho Branco
            '🎩', // Chapeleiro Louco
            '😸', // Gato Risonho (Cheshire)
            '👑', // Rainha de Copas
            '🍄', // Cogumelo Mágico
            '🐛', // Lagarta
            '🫖'  // Bule de Chá
        ];

        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;
       
        // Variáveis do Temporizador
        let timeElapsed = 0;
        let timerInterval = null;
        let isPlaying = false;

        const boardElement = document.getElementById('game-board');
        const movesElement = document.getElementById('moves');
        const timerElement = document.getElementById('timer');
        const victoryModal = document.getElementById('victory-modal');
        const modalContent = document.getElementById('modal-content');

        // Formatar tempo (segundos para MM:SS)
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            isPlaying = true;
            timerInterval = setInterval(() => {
                timeElapsed++;
                timerElement.innerText = formatTime(timeElapsed);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isPlaying = false;
        }

        // Função principal para iniciar/reiniciar o jogo
        function initGame() {
            // Resetar variáveis
            boardElement.innerHTML = '';
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            moves = 0;
            matchedPairs = 0;
            timeElapsed = 0;
           
            movesElement.innerText = moves;
            timerElement.innerText = '00:00';
            stopTimer();

            // Criar array de cartas em pares e baralhar
            cards = [...characters, ...characters];
            cards.sort(() => Math.random() - 0.5);

            // Gerar HTML das cartas
            cards.forEach((char, index) => {
                const card = document.createElement('div');
                card.classList.add('card', 'cursor-pointer', 'w-full', 'aspect-[3/4]');
                card.dataset.character = char;
                card.dataset.index = index;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">
                            🗝️
                        </div>
                        <div class="card-front">
                            ${char}
                        </div>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                boardElement.appendChild(card);
            });
        }

        function flipCard() {
            // Iniciar temporizador no primeiro clique
            if (!isPlaying) startTimer();

            // Bloquear clique se o tabuleiro estiver trancado ou se clicar na mesma carta
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                // Primeira carta clicada
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Segunda carta clicada
            secondCard = this;
            moves++;
            movesElement.innerText = moves;
           
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.character === secondCard.dataset.character;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            // Se as cartas coincidem
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
           
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            matchedPairs++;
            resetBoard();

            // Verificar se ganhou
            if (matchedPairs === characters.length) {
                setTimeout(showVictory, 500);
            }
        }

        function unflipCards() {
            // Se não coincidem, bloquear tabuleiro e virar de volta após 1 segundo
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function showVictory() {
            stopTimer();
            document.getElementById('final-time').innerText = formatTime(timeElapsed);
            document.getElementById('final-moves').innerText = moves;
           
            victoryModal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function closeModalAndRestart() {
            victoryModal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.add('scale-95');
            modalContent.classList.remove('scale-100');
            setTimeout(initGame, 500); // Esperar a animação do modal terminar
        }

        // Iniciar jogo ao carregar a página
        window.onload = initGame;

    </script>
</body>
</html>
